/* ===== EVENT EXPORT (PDF / EXCEL) ===== */
function exportEventPDF(evtId){
  const evt=S.events.find(e=>e.id===evtId);
  if(!evt){toast('⚠️ Renginys nerastas');return}
  try{
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});
    const W=doc.internal.pageSize.getWidth();
    const H=doc.internal.pageSize.getHeight();
    const margin=14;
    
    // === DESIGN TOKENS (match Oniroco app — dark theme accents on light body) ===
    const C={
      ink:[28,28,30],          // primary text
      ink2:[99,99,102],        // secondary text
      ink3:[174,174,178],      // tertiary
      bg:[250,250,252],        // surface
      bg2:[245,245,247],       // surface2
      border:[229,229,234],    // border
      ac:[0,113,227],          // accent blue
      acLight:[230,242,255],   // accent bg
      green:[48,209,88],
      greenLight:[226,247,232],
      amber:[255,159,10],
      amberLight:[255,243,224],
      red:[255,69,58],
      redLight:[255,232,230],
      purple:[175,82,222],
      purpleLight:[245,233,253],
      // Dark theme (for header/footer)
      darkBg:[10,10,12],          // app's main dark background
      darkBg2:[24,24,28],         // app's surface
      darkText:[255,255,255],     // primary text on dark
      darkText2:[174,174,178],    // secondary text on dark
      darkBorder:[44,44,48],      // border on dark
    };
    
    // Category colors (match EVT_CATS)
    const catColor=(()=>{
      const cat=evt.category||EVT_CAT_DEFAULT;
      if(cat==='techno')return C.purple;
      if(cat==='b2b')return C.ac;
      if(cat==='rental')return C.green;
      return [142,142,147];
    })();
    
    // Helpers
    const setColor=(arr,fn)=>{(fn||doc.setFillColor.bind(doc)).apply(doc,arr)};
    const text=(t,x,y,opts)=>{
      const o=opts||{};
      if(o.size)doc.setFontSize(o.size);
      if(o.color)setColor(o.color,doc.setTextColor.bind(doc));
      if(o.weight==='bold')doc.setFont(undefined,'bold');
      else doc.setFont(undefined,'normal');
      doc.text(t,x,y,o);
      doc.setFont(undefined,'normal');
    };
    const card=(x,y,w,h,opts)=>{
      const o=opts||{};
      setColor(o.fill||C.bg,doc.setFillColor.bind(doc));
      setColor(o.border||C.border,doc.setDrawColor.bind(doc));
      doc.setLineWidth(0.2);
      doc.roundedRect(x,y,w,h,2,2,'FD');
    };
    
    // === DARK HEADER WITH ONIROCO LOGO ===
    const headerH=46;
    setColor(C.darkBg,doc.setFillColor.bind(doc));
    doc.rect(0,0,W,headerH,'F');
    
    // Subtle accent stripe at very top
    setColor(C.ac,doc.setFillColor.bind(doc));
    doc.rect(0,0,W,1.5,'F');
    
    // Try to add Oniroco logo image (from page DOM <img class="hdr-logo">)
    let logoAdded=false;
    try {
      const logoEl=document.querySelector('.hdr-logo, .login-logo-img');
      if(logoEl&&logoEl.src&&logoEl.src.startsWith('data:image/')){
        // Add the actual logo PNG/JPG
        const logoH=14;
        const logoW=logoH*3.5; // approximate aspect ratio of Oniroco wordmark
        doc.addImage(logoEl.src,'JPEG',margin,11,logoW,logoH,undefined,'FAST');
        logoAdded=true;
      }
    } catch(err){
      console.warn('PDF logo embed failed:',err);
    }
    
    // Fallback wordmark if image fails
    if(!logoAdded){
      text('ONIROCO',margin,18,{size:22,color:C.darkText,weight:'bold'});
      text('STUDIO',margin+44,18,{size:10,color:C.ac,weight:'bold'});
    }
    
    // Tagline below logo
    text('Intelligent Event Control',margin,32,{size:8,color:C.darkText2});
    text('Renginių valdymo sistema',margin,37,{size:7,color:C.darkText2});
    
    // Doc type label (right side, on dark bg)
    text('RENGINIO ATASKAITA',W-margin,18,{size:10,color:C.darkText,weight:'bold',align:'right'});
    text(fmtD(Date.now()).split(' ')[0],W-margin,24,{size:8,color:C.darkText2,align:'right'});
    
    // Vertical accent line on right
    setColor(C.ac,doc.setFillColor.bind(doc));
    doc.rect(W-margin-2,11,0.6,18,'F');
    
    // Bottom border of header
    setColor(C.ac,doc.setDrawColor.bind(doc));
    doc.setLineWidth(0.5);
    doc.line(0,headerH,W,headerH);
    
    // === HERO: Event title block ===
    let y=headerH+10;
    // Category badge
    const catLabel=(EVT_CATS[evt.category||EVT_CAT_DEFAULT]||EVT_CATS.other).label;
    setColor(catColor,doc.setFillColor.bind(doc));
    const catW=doc.getTextWidth(catLabel)+6;
    doc.roundedRect(margin,y-4,catW,5,1,1,'F');
    text(catLabel,margin+3,y-0.5,{size:7,color:[255,255,255],weight:'bold'});
    y+=4;
    
    // Event name (big)
    const evtName=(evt.name||'Be pavadinimo').substring(0,80);
    text(evtName,margin,y+8,{size:22,color:C.ink,weight:'bold'});
    y+=14;
    
    // Date line under title
    if(evt.date){
      const dr=evt.endDate&&evt.endDate!==evt.date?(evt.date+' → '+evt.endDate):evt.date;
      const tm=(evt.startTime||evt.endTime)?'  ·  '+(evt.startTime||'?')+(evt.endTime?' – '+evt.endTime:''):'';
      text('📅 '+dr+tm,margin,y+5,{size:11,color:C.ac,weight:'bold'});
      y+=9;
    }
    if(evt.location){
      text('📍 '+evt.location,margin,y+3,{size:10,color:C.ink2});
      y+=6;
    }
    
    y+=6;
    
    // === META INFO CARDS (2-column grid) ===
    const colW=(W-margin*2-4)/2;
    const cardH=22;
    
    function infoCard(x,cy,w,h,label,value,color){
      card(x,cy,w,h,{fill:[255,255,255],border:C.border});
      // Left color stripe
      setColor(color||C.ac,doc.setFillColor.bind(doc));
      doc.rect(x,cy,1.5,h,'F');
      // Label
      text(label.toUpperCase(),x+5,cy+5,{size:7,color:C.ink2,weight:'bold'});
      // Value (with text wrapping)
      const lines=doc.splitTextToSize(value||'—',w-8);
      text(lines.slice(0,2).join('\n'),x+5,cy+10,{size:10,color:C.ink});
    }
    
    if(evt.responsible||evt.responsiblePhone||evt.responsibleEmail){
      infoCard(margin,y,colW,cardH,'Kontaktinis asmuo',
        (evt.responsible||'—')+(evt.responsiblePhone?' · '+evt.responsiblePhone:''),
        C.ac);
      
      const creator=getEvtCreatorName(evt);
      infoCard(margin+colW+4,y,colW,cardH,'Sukūrė',creator||'—',C.purple);
      y+=cardH+4;
    }
    
    if(evt.responsibleEmail){
      infoCard(margin,y,W-margin*2,12,'El. paštas',evt.responsibleEmail,C.amber);
      y+=14;
    }
    
    // === DESCRIPTION (if present) ===
    if(evt.desc&&evt.desc.trim()){
      y+=2;
      // Section divider
      setColor(C.ink,doc.setDrawColor.bind(doc));
      doc.setLineWidth(0.5);
      doc.line(margin,y,margin+10,y);
      text('APRAŠYMAS',margin+12,y+1,{size:8,color:C.ink2,weight:'bold'});
      y+=5;
      const userLines=evt.desc.split(/\r?\n/);
      doc.setFontSize(10);doc.setTextColor(...C.ink);
      userLines.forEach(ul=>{
        if(!ul.trim()){y+=3;return}
        const wrapped=doc.splitTextToSize(ul,W-margin*2);
        wrapped.forEach(w=>{
          if(y>270){doc.addPage();y=20}
          doc.text(w,margin,y);y+=4.5;
        });
      });
      y+=4;
    }
    
    // === STATS BAR ===
    const plan=evt.plan||[];
    const tasks=evt.tasks||[];
    const team=evt.team||[];
    const photos=evt.photos||[];
    
    if(plan.length||tasks.length||team.length||photos.length){
      y+=2;
      const stats=[];
      if(plan.length)stats.push({label:'Įranga',value:plan.filter(p=>p.takenTs).length+'/'+plan.length,color:C.ac});
      if(tasks.length)stats.push({label:'Užduotys',value:tasks.filter(t=>t.done).length+'/'+tasks.length,color:C.green});
      if(team.length)stats.push({label:'Komanda',value:String(team.length),color:C.amber});
      if(photos.length)stats.push({label:'Nuotraukos',value:String(photos.length),color:C.purple});
      
      const statW=(W-margin*2-(stats.length-1)*4)/stats.length;
      stats.forEach((s,i)=>{
        const sx=margin+i*(statW+4);
        // Card
        card(sx,y,statW,16,{fill:[252,252,253],border:C.border});
        // Color bar top
        setColor(s.color,doc.setFillColor.bind(doc));
        doc.roundedRect(sx,y,statW,1.5,0.5,0.5,'F');
        text(s.label.toUpperCase(),sx+statW/2,y+6,{size:7,color:C.ink2,weight:'bold',align:'center'});
        text(s.value,sx+statW/2,y+13,{size:14,color:C.ink,weight:'bold',align:'center'});
      });
      y+=20;
    }
    
    // Helper: section header (colored bar with title)
    function sectionHdr(title,subtitle,color){
      if(y>250){doc.addPage();y=20}
      y+=4;
      setColor(color,doc.setFillColor.bind(doc));
      doc.roundedRect(margin,y,W-margin*2,8,1,1,'F');
      text(title,margin+3,y+5.5,{size:11,color:[255,255,255],weight:'bold'});
      if(subtitle)text(subtitle,W-margin-3,y+5.5,{size:9,color:[255,255,255],align:'right'});
      y+=11;
    }
    
    // === EQUIPMENT TABLE ===
    if(plan.length>0){
      sectionHdr('ĮRANGA',plan.filter(p=>p.takenTs).length+' / '+plan.length+' paimta',C.ac);
      const planRows=plan.map(p=>{
        const eq=S.eq.find(e=>e.id===p.eqId);
        return [
          p.eqName||(eq?eq.name:'?'),
          eq?(catStr(eq)||'-'):'-',
          eq&&eq.serialNo?eq.serialNo:'-',
          p.mustHave?'✓':'',
          p.assignedUserName||'-',
          p.takenTs?'PAIMTA':'NEPAIMTA'
        ];
      });
      doc.autoTable({
        startY:y,
        head:[['Įranga','Kategorija','S/N','Privaloma','Priskirta','Statusas']],
        body:planRows,
        theme:'plain',
        styles:{fontSize:8,cellPadding:2.5,textColor:C.ink,lineColor:C.border,lineWidth:0.1},
        headStyles:{fillColor:C.bg2,textColor:C.ink,fontStyle:'bold',cellPadding:3,lineWidth:0.1,lineColor:C.border},
        alternateRowStyles:{fillColor:[252,252,253]},
        columnStyles:{0:{cellWidth:42,fontStyle:'bold'},1:{cellWidth:32},2:{cellWidth:22,textColor:C.ink2},3:{cellWidth:18,halign:'center'},4:{cellWidth:30},5:{cellWidth:'auto',fontStyle:'bold'}},
        didParseCell:(d)=>{
          if(d.section==='body'&&d.column.index===5){
            d.cell.styles.textColor=d.cell.text[0]==='PAIMTA'?C.green:C.red;
          }
        },
        margin:{left:margin,right:margin}
      });
      y=doc.lastAutoTable.finalY+4;
    }
    
    // === TASKS TABLE ===
    if(tasks.length>0){
      sectionHdr('UŽDUOTYS',tasks.filter(t=>t.done).length+' / '+tasks.length+' atlikta',C.green);
      doc.autoTable({
        startY:y,
        head:[['','Užduotis','Terminas','Atliko / Sukūrė']],
        body:tasks.map(t=>[
          t.done?'✓':'○',
          (t.text||'').substring(0,80),
          t.deadline||'—',
          t.done?(t.doneBy||'?'):(t.addedBy||'?')
        ]),
        theme:'plain',
        styles:{fontSize:8,cellPadding:2.5,textColor:C.ink,lineColor:C.border,lineWidth:0.1},
        headStyles:{fillColor:C.bg2,textColor:C.ink,fontStyle:'bold',cellPadding:3,lineWidth:0.1,lineColor:C.border},
        alternateRowStyles:{fillColor:[252,252,253]},
        columnStyles:{0:{cellWidth:8,halign:'center',fontStyle:'bold'},1:{cellWidth:'auto'},2:{cellWidth:25,textColor:C.ink2},3:{cellWidth:38,textColor:C.ink2}},
        didParseCell:(d)=>{
          if(d.section==='body'&&d.column.index===0){
            d.cell.styles.textColor=d.cell.text[0]==='✓'?C.green:C.ink3;
          }
        },
        margin:{left:margin,right:margin}
      });
      y=doc.lastAutoTable.finalY+4;
    }
    
    // === SERVICES (PASLAUGOS) — financial data, ONLY for admin/event_org PDFs ===
    const canSeeFinancials=isAdmin()||isOrg();
    const services=evt.services||[];
    if(canSeeFinancials&&services.length>0){
      sectionHdr('PASLAUGOS',services.length+' '+(services.length===1?'paslauga':'paslaugos'),C.green);
      const servicesRows=services.map(s=>{
        const qty=parseFloat(s.qty)||1;
        const price=parseFloat(s.priceNet)||0;
        const rate=parseFloat(s.vatRate)||0;
        const lineNet=qty*price;
        const lineTotal=lineNet*(1+rate/100);
        return [
          (s.name||'—'),
          (qty+' '+(s.unit||'vnt.')),
          fmtMoney(price),
          rate+'%',
          fmtMoney(lineNet),
          fmtMoney(lineTotal),
        ];
      });
      doc.autoTable({
        startY:y,
        head:[['Paslauga','Kiekis','Kaina/vnt.','PVM','Suma be PVM','Iš viso']],
        body:servicesRows,
        theme:'plain',
        styles:{fontSize:8,cellPadding:2.5,textColor:C.ink,lineColor:C.border,lineWidth:0.1},
        headStyles:{fillColor:C.bg2,textColor:C.ink,fontStyle:'bold',cellPadding:3,lineWidth:0.1,lineColor:C.border},
        alternateRowStyles:{fillColor:[252,252,253]},
        columnStyles:{
          0:{cellWidth:'auto',fontStyle:'bold'},
          1:{cellWidth:24,halign:'center',textColor:C.ink2},
          2:{cellWidth:26,halign:'right',textColor:C.ink2},
          3:{cellWidth:18,halign:'center',textColor:C.ink2},
          4:{cellWidth:30,halign:'right'},
          5:{cellWidth:30,halign:'right',fontStyle:'bold',textColor:C.green}
        },
        margin:{left:margin,right:margin}
      });
      y=doc.lastAutoTable.finalY+4;
      
      // Totals summary box
      const totals=calcServicesTotal(services);
      if(y>240){doc.addPage();y=20}
      // Background
      setColor([240,253,244],doc.setFillColor.bind(doc));
      setColor(C.green,doc.setDrawColor.bind(doc));
      doc.setLineWidth(0.4);
      doc.roundedRect(margin,y,W-margin*2,28,2,2,'FD');
      // Content
      const summaryX=margin+8;
      const valuesX=W-margin-8;
      text('Suma be PVM:',summaryX,y+8,{size:9,color:C.ink2});
      text(fmtMoney(totals.net),valuesX,y+8,{size:9,color:C.ink,weight:'bold',align:'right'});
      let yLine=y+14;
      if(totals.breakdown[12]>0){
        text('PVM 12%:',summaryX,yLine,{size:8,color:C.ink2});
        text(fmtMoney(totals.breakdown[12]),valuesX,yLine,{size:8,color:C.ink2,align:'right'});
        yLine+=4;
      }
      if(totals.breakdown[21]>0){
        text('PVM 21%:',summaryX,yLine,{size:8,color:C.ink2});
        text(fmtMoney(totals.breakdown[21]),valuesX,yLine,{size:8,color:C.ink2,align:'right'});
        yLine+=4;
      }
      // Total line  
      setColor(C.green,doc.setDrawColor.bind(doc));
      doc.setLineWidth(0.3);
      doc.line(summaryX,y+22,valuesX,y+22);
      text('IŠ VISO su PVM:',summaryX,y+26,{size:11,color:C.green,weight:'bold'});
      text(fmtMoney(totals.total),valuesX,y+26,{size:13,color:C.green,weight:'bold',align:'right'});
      y+=32;
    }
    
    // === TEAM TABLE ===
    if(team.length>0){
      sectionHdr('KOMANDA',team.length+' '+(team.length===1?'narys':'nariai'),C.amber);
      doc.autoTable({
        startY:y,
        head:[['Vardas','Pareigos','Telefonas','El. paštas']],
        body:team.map(t=>{
          const u=t.userId?S.users.find(u=>u.id===t.userId):null;
          const emp=t.userId?S.employees.find(e=>e.userId===t.userId):null;
          const name=teamMemberName(t);
          const role=t.role||(u?(ROLES[u.role]||u.role):'')||'—';
          const phone=(emp&&emp.phone)||(u&&u.phone)||t.phone||'—';
          const email=(u&&u.email)||t.email||'—';
          return [name,role,phone,email];
        }),
        theme:'plain',
        styles:{fontSize:8,cellPadding:2.5,textColor:C.ink,lineColor:C.border,lineWidth:0.1},
        headStyles:{fillColor:C.bg2,textColor:C.ink,fontStyle:'bold',cellPadding:3,lineWidth:0.1,lineColor:C.border},
        alternateRowStyles:{fillColor:[252,252,253]},
        columnStyles:{0:{cellWidth:50,fontStyle:'bold'},1:{cellWidth:42,textColor:C.ink2},2:{cellWidth:32},3:{cellWidth:'auto',textColor:C.ink2}},
        margin:{left:margin,right:margin}
      });
      y=doc.lastAutoTable.finalY+4;
    }
    
    // === CHAT ===
    const chat=(evt.chat||[]).slice().sort((a,b)=>a.ts-b.ts);
    if(chat.length>0){
      sectionHdr('POKALBIS',chat.length+' žinučių',[120,120,127]);
      doc.autoTable({
        startY:y,
        head:[['Data','Autorius','Žinutė']],
        body:chat.map(m=>[
          fmtD(m.ts),
          (m.by||'?'),
          (m.text||'').substring(0,200)
        ]),
        theme:'plain',
        styles:{fontSize:8,cellPadding:2.5,textColor:C.ink,lineColor:C.border,lineWidth:0.1},
        headStyles:{fillColor:C.bg2,textColor:C.ink,fontStyle:'bold',cellPadding:3,lineWidth:0.1,lineColor:C.border},
        alternateRowStyles:{fillColor:[252,252,253]},
        columnStyles:{0:{cellWidth:32,textColor:C.ink2},1:{cellWidth:38,fontStyle:'bold'},2:{cellWidth:'auto'}},
        margin:{left:margin,right:margin}
      });
    }
    
    // === DARK FOOTER on every page (matches header) ===
    const totalPages=doc.internal.getNumberOfPages();
    for(let p=1;p<=totalPages;p++){
      doc.setPage(p);
      // Dark footer band
      setColor(C.darkBg,doc.setFillColor.bind(doc));
      doc.rect(0,H-14,W,14,'F');
      // Top accent line
      setColor(C.ac,doc.setDrawColor.bind(doc));
      doc.setLineWidth(0.4);
      doc.line(0,H-14,W,H-14);
      // Brand bottom-left
      text('ONIROCO',margin,H-7,{size:9,color:C.darkText,weight:'bold'});
      text('IEC',margin+18,H-7,{size:7,color:C.ac,weight:'bold'});
      // Generated info bottom-center
      const gen='Sugeneruota: '+fmtD(Date.now())+(S.session?(' · '+S.session.name):'');
      text(gen,W/2,H-7,{size:7,color:C.darkText2,align:'center'});
      // Page number bottom-right
      text(p+' / '+totalPages,W-margin,H-7,{size:7,color:C.darkText2,align:'right'});
    }
    
    const safeName=(evt.name||'renginys').replace(/[^a-zA-Z0-9-_]/g,'_').substring(0,40);
    doc.save('Oniroco_'+safeName+'_'+new Date().toISOString().slice(0,10)+'.pdf');
    logAction('EVT_PDF_EXPORTED','event',{id:evt.id,name:evt.name});
    toast('📄 PDF atsisiųstas!');
  }catch(e){
    console.error('exportEventPDF:',e);
    toast('❌ PDF klaida: '+e.message);
  }
}

function exportEventExcel(evtId){
  const evt=S.events.find(e=>e.id===evtId);
  if(!evt){toast('⚠️ Renginys nerastas');return}
  try{
    const wb=XLSX.utils.book_new();
    
    // Sheet 1: Info
    const dateRange=evt.endDate&&evt.endDate!==evt.date?(evt.date+' → '+evt.endDate):(evt.date||'—');
    const infoRows=[
      {'Laukas':'Pavadinimas','Reikšmė':evt.name||''},
      {'Laukas':'Data','Reikšmė':dateRange},
      {'Laukas':'Pradžios laikas','Reikšmė':evt.startTime||'—'},
      {'Laukas':'Pabaigos laikas','Reikšmė':evt.endTime||'—'},
      {'Laukas':'Vieta','Reikšmė':evt.location||'—'},
      {'Laukas':'Kontaktinis asmuo','Reikšmė':evt.responsible||'—'},
      {'Laukas':'Telefonas','Reikšmė':evt.responsiblePhone||'—'},
      {'Laukas':'El. paštas','Reikšmė':evt.responsibleEmail||'—'},
      {'Laukas':'Aprašymas','Reikšmė':evt.desc||'—'},
      {'Laukas':'Statusas','Reikšmė':evt.archived?'Įvykęs':'Aktyvus'},
      {'Laukas':'Sukūrė','Reikšmė':evt.createdBy||'—'},
      {'Laukas':'Sugeneruota','Reikšmė':fmtD(Date.now())+(S.session?(' ('+S.session.name+')'):'')}
    ];
    const ws1=XLSX.utils.json_to_sheet(infoRows);
    ws1['!cols']=[{wch:24},{wch:60}];
    XLSX.utils.book_append_sheet(wb,ws1,'Info');
    
    // Sheet 2: Equipment plan
    const plan=evt.plan||[];
    if(plan.length>0){
      const planRows=plan.map(p=>{
        const eq=S.eq.find(e=>e.id===p.eqId);
        return {
          'Įranga':p.eqName||(eq?eq.name:'?'),
          'Kategorija':eq?(catStr(eq)||''):'',
          'S/N':eq&&eq.serialNo?eq.serialNo:'',
          'Sandėlis':eq?(locName(eq.locId)||''):'',
          'Privaloma':p.mustHave?'TAIP':'',
          'Priskirta':p.assignedUserName||'',
          'Iš komplekto':p.fromKit||'',
          'Statusas':p.takenTs?'Paimta':'Nepaimta',
          'Paėmė':p.takenBy||'',
          'Paimta':p.takenTs?fmtD(p.takenTs):'',
          'Pridėjo':p.addedBy||'',
          'Pridėta':p.addedAt?fmtD(p.addedAt):''
        };
      });
      const ws2=XLSX.utils.json_to_sheet(planRows);
      ws2['!cols']=[{wch:30},{wch:25},{wch:15},{wch:18},{wch:11},{wch:22},{wch:18},{wch:11},{wch:20},{wch:18},{wch:18},{wch:18}];
      XLSX.utils.book_append_sheet(wb,ws2,'Įranga');
    }
    
    // Sheet 3: Tasks
    const tasks=evt.tasks||[];
    if(tasks.length>0){
      const taskRows=tasks.map(t=>({
        'Statusas':t.done?'Atlikta':'Neatlikta',
        'Užduotis':t.text||'',
        'Terminas':t.deadline||'',
        'Sukūrė':t.addedBy||'',
        'Sukurta':t.addedTs?fmtD(t.addedTs):'',
        'Atliko':t.done?(t.doneBy||''):'',
        'Atlikta':t.done&&t.doneTs?fmtD(t.doneTs):'',
        'Iš šablono':t.fromTemplate||''
      }));
      const ws3=XLSX.utils.json_to_sheet(taskRows);
      ws3['!cols']=[{wch:11},{wch:50},{wch:14},{wch:20},{wch:18},{wch:20},{wch:18},{wch:20}];
      XLSX.utils.book_append_sheet(wb,ws3,'Taskai');
    }
    
    // Sheet 4: Team
    const team=evt.team||[];
    if(team.length>0){
      const teamRows=team.map(t=>{
        const u=t.userId?S.users.find(u=>u.id===t.userId):null;
        return {
          'Vardas':t.name||'',
          'Tipas':t.type==='user'?'Sistemos vartotojas':'Pagalbinis',
          'Pareigos':t.role||'',
          'Telefonas':(u?u.phone:t.phone)||'',
          'El. paštas':(u?u.email:t.email)||''
        };
      });
      const ws4=XLSX.utils.json_to_sheet(teamRows);
      ws4['!cols']=[{wch:25},{wch:22},{wch:22},{wch:18},{wch:30}];
      XLSX.utils.book_append_sheet(wb,ws4,'Komanda');
    }
    
    // Sheet 5: Activity log
    const logEntries=getEventLog(evt);
    if(logEntries.length>0){
      const logRows=logEntries.map(e=>{
        const lab=AUDIT_LABELS[e.action]||{label:e.action};
        let detail='';
        if(e.details){
          if(e.details.eqName)detail=e.details.eqName;
          else if(e.details.memberName)detail=e.details.memberName;
          else if(e.details.note)detail=e.details.note;
        }
        return {
          'Data':fmtD(e.ts),
          'Veiksmas':lab.label,
          'Detalė':detail,
          'Vartotojas':e.userName||'',
          'Rolė':e.roleLabel||''
        };
      });
      const ws5=XLSX.utils.json_to_sheet(logRows);
      ws5['!cols']=[{wch:18},{wch:28},{wch:35},{wch:22},{wch:22}];
      XLSX.utils.book_append_sheet(wb,ws5,'Žurnalas');
    }
    
    // Sheet 6: Chat
    const chat=(evt.chat||[]).slice().sort((a,b)=>a.ts-b.ts);
    if(chat.length>0){
      const chatRows=chat.map(m=>({
        'Data':fmtD(m.ts),
        'Autorius':m.by||'',
        'Rolė':m.role||'',
        'Žinutė':m.text||''
      }));
      const ws6=XLSX.utils.json_to_sheet(chatRows);
      ws6['!cols']=[{wch:18},{wch:22},{wch:22},{wch:60}];
      XLSX.utils.book_append_sheet(wb,ws6,'Pokalbis');
    }
    
    const safeName=(evt.name||'renginys').replace(/[^a-zA-Z0-9-_]/g,'_').substring(0,40);
    XLSX.writeFile(wb,'renginys-'+safeName+'-'+new Date().toISOString().slice(0,10)+'.xlsx');
    logAction('EVT_EXCEL_EXPORTED','event',{id:evt.id,name:evt.name});
    toast('📊 Excel atsisiųstas!');
  }catch(e){
    console.error('exportEventExcel:',e);
    toast('❌ Excel klaida: '+e.message);
  }
}

/* ===== ORG PLAN ACTIONS ===== */

async function assignPlanItem(evtId, eqId, userId){
  const evt=S.events.find(e=>e.id===evtId);if(!evt)return;
  const user=userId?S.users.find(u=>u.id===userId):null;
  evt.plan=(evt.plan||[]).map(p=>p.eqId===eqId?{...p,assignedUserId:userId||null,assignedUserName:user?user.name:null}:p);
  S.events=S.events.map(e=>e.id===evtId?evt:e);
  await save('events',evtId)
  renderAll();toast(user?'👤 Priskirta: '+user.name:'Priskyrimas pašalintas');

function getMyAssignments(){
  if(!S.session)return[];
  const myUid=S.session.userId;
  const myName=S.session.name;
  const today=new Date().toISOString().slice(0,10);
  const res=[];
  S.events.forEach(evt=>{
    if(evt.deleted)return;
    // Skip only if event clearly in past (more than 1 day ago)
    if(evt.date){
      const d=new Date(evt.date);
      const cutoff=new Date();cutoff.setDate(cutoff.getDate()-1);
      if(d<cutoff)return;
    }
    (evt.plan||[]).forEach(p=>{
      if(p.takenTs)return;
      // Match assignment by ANY of these:
      // 1. assignedUserId equals my userId directly
      // 2. assignedUserName equals my name
      // 3. assignedUserId matches a team member whose userId/id matches mine
      let isMine=false;
      if(p.assignedUserId===myUid)isMine=true;
      else if(p.assignedUserName===myName)isMine=true;
      else if(p.assignedUserId){
        const tm=(evt.team||[]).find(t=>t.id===p.assignedUserId);
        if(tm&&(tm.userId===myUid||tm.id===myUid||tm.name===myName))isMine=true;
      }
      if(isMine){
        res.push({evt,plan:p,eq:S.eq.find(e=>e.id===p.eqId)});
      }
    });
  });
  return res;
}

async function removeFromTeam(evtId, memberId){

  const removed=(evt.team||[]).find(t=>t.id===memberId);
  evt.team=(evt.team||[]).filter(t=>t.id!==memberId);

  } else {

          (photo?'<img src="'+esc(photo)+'" style="width:100%;height:100%;object-fit:cover">':initials(u.name))+
        '</div>'+
        '<div class="lcard-body"><div class="lcard-name">'+esc(u.name)+'</div>'+
        '<div class="lcard-sub" style="display:flex;flex-direction:column;gap:2px">'+
          '<span style="color:'+roleColor+';font-weight:600">'+esc(ROLES[u.role]||u.role)+'</span>'+
          (phone?'<span>📞 '+esc(phone)+'</span>':'')+

  modal.innerHTML=mHead('👤 Pasirinkti komandos narį')+mBody(body)+

async function autoArchiveEvents(){
  let changed=false;
  const now=new Date();
  S.events.forEach(evt=>{
    if(evt.archived||!evt.date)return;
    const lastDay=evt.endDate||evt.date;
    const d=new Date(lastDay);
    const cutoff=new Date(now);cutoff.setDate(cutoff.getDate()-1);
    if(d<cutoff){
      evt.archived=true;
      evt.archivedAt=Date.now();
      evt.archivedAuto=true;
      changed=true;
    }
  });
  if(changed){
    await save('events');
    if(typeof FB!=='undefined'&&FB){
      try{
        for(const e of S.events.filter(x=>x.archivedAuto&&!x._fbSynced)){
          await FB.collection('events').doc(e.id).set(e);
          e._fbSynced=true;
        }
      }catch(err){}
    }
  }
}

/* ===== MANO PAIMTA TAB ===== */
function vMyTaken(){
  const myUid=S.session.userId;
  const myName=S.session.name;
  // 1. Equipment I personally took
  const personally=S.eq.filter(e=>e.s==='o'&&(e.byId===myUid||e.byName===myName));
  // 2. Equipment from events where I'm a team member (taken by anyone)
  const myEvtIds=S.events.filter(evt=>(evt.team||[]).some(t=>t.id===myUid||t.userId===myUid||t.name===myName)).map(e=>e.id);
  const teamEq=S.eq.filter(e=>e.s==='o'&&e.evtId&&myEvtIds.includes(e.evtId)&&!personally.includes(e));
  // 3. If admin/org — show ALL taken equipment
  const allTaken=(isAdmin()||isOrg())?S.eq.filter(e=>e.s==='o'&&!personally.includes(e)&&!teamEq.includes(e)):[];
  const myEq=[...personally,...teamEq];
  const totalCount=myEq.length;
  const teamCount=teamEq.length;
  const allOtherCount=allTaken.length;
  const overdue=myEq.filter(e=>isEqOverdue(e));

  let h='<div style="margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px">'+
    '<div><div style="font-size:26px;font-weight:700;letter-spacing:-0.6px">📥 Grąžinti įrangą</div>'+
    '<div style="font-size:13px;color:var(--tx2);margin-top:2px">Visi paimti vienetai — spauskite „Grąžinti“, kad pažymėtumėte</div></div>'+
    (totalCount>0?'<div style="font-size:34px;font-weight:700;color:var(--ac);line-height:1">'+totalCount+'</div>':'')+
    '</div>';

  if(totalCount===0){
    h+='<div class="empty"><div class="empty-i">📥</div>Nėra grąžintinos įrangos<div style="font-size:12px;margin-top:8px">Visa renginių įranga jau grąžinta</div></div>';
    return h;
  }

  if(overdue.length>0){
    h+='<div class="overdue-bar" style="margin-bottom:14px"><div class="overdue-num">'+overdue.length+'</div><div class="overdue-info"><h4>Užvėluotas grąžinimas</h4><p>Praėjo daugiau nei 24h po renginio</p></div></div>';
  }

  // Quick actions
  h+='<div style="display:flex;gap:8px;margin-bottom:14px">'+
    '<button class="btn bp" style="flex:1;justify-content:center" onclick="S.tab=\'scanner\';S.scan=\'idle\';renderAll()">📷 Skenuoti grąžinimui</button>'+
    '</div>';

  // Group by event
  function renderEqCard(eq){
    const ph=eqPhoto(eq.id);
    const od=isEqOverdue(eq);
    const elapsed=eq.at?ago(eq.at):'';
    const isMine=eq.byId===myUid||eq.byName===myName;
    return '<div class="lcard" style="border-left:3px solid '+(od?'var(--red)':isMine?'var(--ac)':'var(--amber)')+'">'+
      '<div class="lcard-ico" style="width:44px;height:44px;font-size:1.2rem;background:'+(isMine?'var(--ac-dim)':'var(--amber-bg)')+';border-radius:10px">'+(ph?'<img src="'+ph+'">':eq.ico||'🔧')+'</div>'+
      '<div class="lcard-body">'+
        '<div class="lcard-name">'+(eq.vip?'⭐ ':'')+esc(eq.name)+'</div>'+
        '<div class="lcard-sub">'+
          '<span>👤 '+esc(eq.byName||'?')+'</span>'+
          (od?'<span style="color:var(--red);font-weight:700">⚠️ Užvėluota</span>':'<span>'+elapsed+'</span>')+
        '</div>'+
      '</div>'+
      '<button class="btn bg" style="padding:10px 16px;font-size:14px;font-weight:600" data-return-eq="'+eq.id+'">📥 Grąžinti</button>'+
    '</div>';
  }
  function groupByEvt(items){
    const g={};
    items.forEach(eq=>{
      const k=eq.evtId||'_none';
      if(!g[k])g[k]={evt:S.events.find(e=>e.id===eq.evtId),items:[]};
      g[k].items.push(eq);
    });
    return g;
  }

  if(personally.length>0){
    h+='<div class="sh" style="color:var(--ac)">⭐ Mano paimta ('+personally.length+')</div>';
    const grp=groupByEvt(personally);
    Object.entries(grp).forEach(([gid,g])=>{
      const title=g.evt?g.evt.name:'Be renginio';
      const dateStr=g.evt&&g.evt.date?' · 📅 '+g.evt.date:'';
      h+='<div style="font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:0.06em;margin:10px 0 6px">🎪 '+esc(title)+esc(dateStr)+'</div>';
      h+='<div class="list" style="margin-bottom:10px">'+g.items.map(renderEqCard).join('')+'</div>';
    });
  }
  if(teamEq.length>0){
    h+='<div class="sh" style="color:var(--amber);margin-top:14px">👥 Komandos paimta ('+teamEq.length+')</div>';
    const grp=groupByEvt(teamEq);
    Object.entries(grp).forEach(([gid,g])=>{
      const title=g.evt?g.evt.name:'Be renginio';
      const dateStr=g.evt&&g.evt.date?' · 📅 '+g.evt.date:'';
      h+='<div style="font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:0.06em;margin:10px 0 6px">🎪 '+esc(title)+esc(dateStr)+'</div>';
      h+='<div class="list" style="margin-bottom:10px">'+g.items.map(renderEqCard).join('')+'</div>';
    });
  }
  if(allOtherCount>0){
    h+='<details style="margin-top:14px"><summary style="cursor:pointer;font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:0.06em;padding:10px 0">🔧 Visi kiti paimti vienetai ('+allOtherCount+') — admin/organizatoriaus prieiga</summary>';
    const grp=groupByEvt(allTaken);
    Object.entries(grp).forEach(([gid,g])=>{
      const title=g.evt?g.evt.name:'Be renginio';
      h+='<div style="font-size:11px;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:0.06em;margin:10px 0 6px">🎪 '+esc(title)+'</div>';
      h+='<div class="list" style="margin-bottom:10px">'+g.items.map(renderEqCard).join('')+'</div>';
    });
    h+='</details>';
  }
  return h;
}

/* ===== SMART OVERDUE CHECK ===== */
function isEqOverdue(eq){
  if(!eq||eq.s!=='o'||!eq.at)return false;
  if(eq.evtId){
    const evt=S.events.find(e=>e.id===eq.evtId);
    if(evt&&evt.date){
      // Use end date if multi-day event, otherwise start date
      const endStr=evt.endDate||evt.date;
      const evDate=new Date(endStr);
      evDate.setHours(23,59,59);
      const cutoff=evDate.getTime()+24*3600000;
      return Date.now()>cutoff;
    }
  }
  return (Date.now()-eq.at)>(S.overdueH||120)*3600000;
}


function findMyEventPlans(eqId){
  if(!S.session)return[];
  const myUid=S.session.userId, myName=S.session.name;
  const today=new Date().toISOString().slice(0,10);
  const tomorrow=new Date();tomorrow.setDate(tomorrow.getDate()+7);
  const tomorrowStr=tomorrow.toISOString().slice(0,10);
  return S.events.filter(evt=>{
    if(evt.archived)return false;
    if(evt.date&&evt.date<today)return false;
    // Must be team member
    const isMember=(evt.team||[]).some(t=>t.id===myUid||t.userId===myUid||t.name===myName);
    if(!isMember)return false;
    // Equipment must be in plan and not taken
    const planItem=(evt.plan||[]).find(p=>p.eqId===eqId&&!p.takenTs);
    return !!planItem;
  }).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
}

async function autoTakeForEvent(eqId, evtId){
  const item=S.eq.find(e=>e.id===eqId);
  const evt=S.events.find(e=>e.id===evtId);
  if(!item||!evt)return;
  
  // Mark in plan
  evt.plan=(evt.plan||[]).map(p=>p.eqId===eqId?{...p,takenTs:Date.now(),takenBy:S.session.name}:p);
  S.events=S.events.map(e=>e.id===evtId?evt:e);
  
  // Take equipment
  S.eq=S.eq.map(e=>e.id===eqId?{...e,s:'o',byId:S.session.userId,byName:S.session.name,at:Date.now(),evtId:evtId,reservation:null}:e);
  
  const tx={id:uid(),eid:eqId,en:item.name,tp:'o',p:S.session.name,pId:S.session.userId,evtId,evN:evt.name,ts:Date.now(),note:'Auto QR'};
  S.tx.unshift(tx);
  
  await save('events');await save('eq');await save('tx');
  if(typeof FB!=='undefined'&&FB){
    try{
      await FB.collection('events').doc(evtId).set(evt);
      await FB.collection('equipment').doc(eqId).set(S.eq.find(e=>e.id===eqId));
      await FB.collection('transactions').doc(tx.id).set(tx);
    }catch(e){}
  }
  
  S.scan='idle';S.scanItem=null;
  renderAll();
  toast('✅ '+item.name+' — paimta į: '+evt.name);
}


/* ===== OVERDUE NOTIFICATION SYSTEM ===== */
function getOverdueEquipment(){
  return S.eq.filter(e=>e.s==='o'&&isEqOverdue(e));
}

function checkOverdueAndNotify(){
  if(!S.session)return;
  // Only admin/organizer get notifications
  if(!isAdmin()&&!isOrg())return;
  const overdue=getOverdueEquipment();
  if(overdue.length===0)return;
  
  // Daily throttle - only show banner once per day
  const today=new Date().toDateString();
  const lastShown=LS.g('overdueBanner_'+S.session.userId);
  
  // Always update banner if today already shown but count changed
  showOverdueBanner(overdue, lastShown===today);
  
  // Mark today as shown
  LS.s('overdueBanner_'+S.session.userId, today);
}

          }
        }, i*500);
      });
    });
  }
}

function buildOverdueMessage(group){
  let msg='Sveiki, '+group.name.split(' ')[0]+'!\n\n';
  msg+='⚠️ Pas jus yra užvėluota įranga, kurią reikia grąžinti:\n\n';
  group.items.forEach(eq=>{
    const evt=S.events.find(e=>e.id===eq.evtId);
    msg+='• '+eq.name;
    if(evt){
      msg+=' ('+evt.name;
      if(evt.endDate||evt.date)msg+=' · '+(evt.endDate||evt.date);
      msg+=')';
    }
    msg+='\n';
  });
  msg+='\nPrašome kuo greičiau grąžinti į sandėlį arba pranešti, jei kyla problema.\n\nAčiū!';
  return msg;
}



/* ===== AUDIT LOG SYSTEM ===== */
async function logAction(action, target, details){
  if(!S.session)return;
  const entry={
    id:uid(),
    ts:Date.now(),
    userId:S.session.userId,
    userName:S.session.name,
    role:S.session.role,
    roleLabel:ROLES[S.session.role]||S.session.role,
    action,                  // e.g. 'EQ_TAKEN', 'EVT_EDITED'
    target:target||'',       // e.g. 'equipment', 'event', 'user'
    targetId:(details&&details.id)||'',
    targetName:(details&&details.name)||'',
    details:details||{}
  };
  if(!S.audit)S.audit=[];
  S.audit.unshift(entry);
  // Keep only last 5000 to prevent storage bloat
  if(S.audit.length>5000)S.audit=S.audit.slice(0,5000);
  // Single optimized write — save('audit') uses dirty tracking → writes only new entry
  // Previously this was followed by a duplicate FB.collection().doc().set() — removed for efficiency
  try{await save('audit',entry.id)}catch(e){console.error('[logAction]',e)}
}

        '<div style="font-size:1.2rem;width:32px;text-align:center">'+meta.ico+'</div>'+
        '<div class="lcard-body">'+
          '<div style="font-size:13px;font-weight:600;color:'+meta.color+'">'+meta.label+'</div>'+
          '<div style="font-size:11px;color:var(--tx2);margin-top:2px">'+
            '<strong>'+esc(a.userName||'?')+'</strong> · '+esc(a.roleLabel||a.role||'')+
            (a.targetName?' · <strong>'+esc(a.targetName)+'</strong>':'')+
            esc(detailStr)+
          '</div>'+
        '</div>'+
        '<div style="font-size:11px;color:var(--tx2);font-variant-numeric:tabular-nums">'+time+'</div>'+

function exportAuditExcel(){
  if(!window.XLSX){toast('XLSX biblioteka nepasiekiama');return}
  const audit=S.audit||[];
  const rows=audit.map(a=>{
    const meta=AUDIT_LABELS[a.action]||{label:a.action};

/* ===== RESERVATION SYSTEM ===== */
async function reserveEquipment(eqId, evtId){
  const eq=S.eq.find(e=>e.id===eqId);
  const evt=S.events.find(e=>e.id===evtId);
  if(!eq||!evt)return;
  if(eq.s==='o'){toast('⚠️ Įranga jau paimta');return}
  if(eq.s==='r'&&eq.reservation&&eq.reservation.evtId!==evtId){
    showConfirmDialog('⚠️ Įranga jau rezervuota',
      'Ši įranga jau rezervuota renginiui „'+(eq.reservation.evtName||'?')+'". Perskirti šiam renginiui?',
      'Perskirti',()=>doReserve(eqId, evtId));
    return;
  }
  doReserve(eqId, evtId);
}

async function doReserve(eqId, evtId){
  const eq=S.eq.find(e=>e.id===eqId);
  const evt=S.events.find(e=>e.id===evtId);
  if(!eq||!evt)return;
  S.eq=S.eq.map(e=>e.id===eqId?{...e,s:'r',reservation:{evtId,evtName:evt.name,evtDate:evt.date||null,evtEndDate:evt.endDate||null,by:S.session.name,byId:S.session.userId,since:Date.now()}}:e);
  await save('eq');
  if(typeof FB!=='undefined'&&FB){try{await FB.collection('equipment').doc(eqId).set(S.eq.find(e=>e.id===eqId))}catch(e){}}
  logAction('EQ_RESERVED','equipment',{id:eqId,name:eq.name,evtName:evt.name});
  renderAll();
  toast('🎯 Rezervuota: '+eq.name+' → '+evt.name);
}

async function unreserveEquipment(eqId){
  const eq=S.eq.find(e=>e.id===eqId);
  if(!eq||eq.s!=='r')return;
  const evtName=(eq.reservation&&eq.reservation.evtName)||'';
  S.eq=S.eq.map(e=>e.id===eqId?{...e,s:'a',reservation:null}:e);
  await save('eq');
  if(typeof FB!=='undefined'&&FB){try{await FB.collection('equipment').doc(eqId).set(S.eq.find(e=>e.id===eqId))}catch(e){}}
  logAction('EQ_UNRESERVED','equipment',{id:eqId,name:eq.name,evtName});
  renderAll();
  toast('↩️ Rezervacija atšaukta: '+eq.name);
}

    '<div class="fg"><label class="fl">Kiek kopijų sukurti?</label>'+
    '<input class="fi" type="number" id="dup-count" value="1" min="1" max="50" style="font-size:16px"></div>'+
    
    '<div class="fg"><label class="fl">Pavadinimo formatas</label>'+
    '<select class="fi" id="dup-format">'+
      '<option value="suffix">Pridėti numerį pabaigoje (pvz. „'+esc(orig.name)+' #2")</option>'+
      '<option value="copy">Pridėti „(kopija)" prefiksą</option>'+
      '<option value="same">Tas pats pavadinimas</option>'+
    '</select></div>'+
    
    '<label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin:14px 0 6px">'+
      '<input type="checkbox" id="dup-keep-sn" style="width:18px;height:18px;accent-color:var(--ac)">'+
      '<span>Generuoti naujus serijos numerius (pvz. ABC-001 → ABC-002)</span>'+
    '</label>'+
    
    '<label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;margin:6px 0 18px">'+
      '<input type="checkbox" id="dup-keep-photo" checked style="width:18px;height:18px;accent-color:var(--ac)">'+
      '<span>Kopijuoti nuotrauką</span>'+
    '</label>'+
    
    '<div style="display:flex;gap:8px;justify-content:flex-end">'+
      '<button class="btn" id="dup-cancel">Atšaukti</button>'+
      '<button class="btn bp" id="dup-confirm">⎘ Dublikuoti</button>'+
    '</div>';
  
  ov.appendChild(card);
  document.body.appendChild(ov);
  
  document.getElementById('dup-cancel').addEventListener('click',()=>ov.remove());
  document.getElementById('dup-confirm').addEventListener('click',async ()=>{
    const count=Math.min(50,Math.max(1,parseInt(document.getElementById('dup-count').value)||1));
    const format=document.getElementById('dup-format').value;
    const keepSn=document.getElementById('dup-keep-sn').checked;
    const keepPhoto=document.getElementById('dup-keep-photo').checked;
    ov.remove();
    await doDuplicate(orig, count, format, keepSn, keepPhoto);
  });
  
  setTimeout(()=>{const inp=document.getElementById('dup-count');if(inp){inp.focus();inp.select()}},100);
}

async function doDuplicate(orig, count, format, keepSn, keepPhoto){
  const newItems=[];
  // Detect SN pattern: e.g. "ABC-001" → increment number
  function nextSn(sn,offset){
    if(!sn)return '';
    const m=sn.match(/^(.*?)(\d+)(\D*)$/);
    if(!m)return sn+'-'+(offset+1);
    const num=parseInt(m[2])+offset+1;
    const padded=String(num).padStart(m[2].length,'0');
    return m[1]+padded+m[3];
  }
  
  for(let i=0;i<count;i++){
    let newName=orig.name;
    if(format==='suffix')newName=orig.name+' #'+(i+2);
    else if(format==='copy')newName='(kopija) '+orig.name;
    
    const newItem={
      ...orig,
      id:uid(),
      name:newName,
      serialNo:keepSn?nextSn(orig.serialNo,i):'',
      s:'a',  // always available — duplicates start free
      byId:null,byName:null,at:null,evtId:null,reservation:null,
      created:Date.now()
    };
    newItems.push(newItem);
    
    // Copy photo if requested
    if(keepPhoto&&orig.id&&S.photos[orig.id]){
      S.photos[newItem.id]=S.photos[orig.id];
    }
  }
  
  S.eq.push(...newItems);
  await save('eq');
  if(keepPhoto)await save('photos');
  
  // Log each duplication
  newItems.forEach(item=>{
    logAction('EQ_CREATED','equipment',{id:item.id,name:item.name,note:'duplikuota iš '+orig.name});
  });
  
  // Sync to Firebase if available
  if(typeof FB!=='undefined'&&FB){
    for(const item of newItems){
      try{await FB.collection('equipment').doc(item.id).set(item)}catch(e){}
    }
  }
  
  renderAll();
  toast('✅ Sukurta '+count+' '+(count===1?'kopija':'kopijos'));
}

async function addDeptFromInput(){
  const inp=document.getElementById('new-dept-name');
  if(!inp)return;
  const name=inp.value.trim();
  if(!name){toast('⚠️ Įveskite pavadinimą');return}
  if(S.depts.find(d=>d.name.toLowerCase()===name.toLowerCase())){toast('⚠️ Toks padalinys jau egzistuoja');return}
  await addDept(name);
  inp.value='';
  logAction('CAT_CREATED','department',{name});
  renderAll();
  toast('✅ Padalinys pridėtas');
}

async function deleteDeptConfirm(id, name, empCount){
  if(empCount>0){
    if(!confirm('Padalinyje „'+name+'" yra '+empCount+' darbuotojų. Ištrynus jiems padalinys bus išvalytas. Tęsti?'))return;
    // Clear from employees
    S.employees=S.employees.map(e=>e.dept===name?{...e,dept:''}:e);
    await save('employees');
  } else {
    if(!confirm('Ištrinti padalinį „'+name+'"?'))return;
  }
  await deleteDept(id);
  logAction('CAT_DELETED','department',{name});
  renderAll();
  toast('🗑️ Ištrinta');
}

function renderDatePresets(fromVar,toVar){
  // fromVar/toVar can be 'state' (S.sDateFrom etc) or input id strings
  return '<div style="display:flex;flex-wrap:wrap;gap:6px;margin:0 0 12px"><div style="font-size:11px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;width:100%;margin-bottom:2px">Greitas filtras:</div>'+
    DATE_PRESETS.map(p=>'<button class="dp-btn" data-preset="'+p.id+'" data-from="'+fromVar+'" data-to="'+toVar+'" onclick="applyDatePreset(this)" style="padding:6px 12px;background:var(--sf2);border:0.5px solid var(--bo);border-radius:99px;font-size:12px;color:var(--tx);cursor:pointer;font-family:inherit;white-space:nowrap">'+p.label+'</button>').join('')+
    '</div>';
}

function applyDatePreset(btn){
  const id=btn.getAttribute('data-preset');
  const fromVar=btn.getAttribute('data-from');
  const toVar=btn.getAttribute('data-to');
  const preset=DATE_PRESETS.find(p=>p.id===id);
  if(!preset)return;
  const range=preset.fn();
  // Stats uses S.sDateFrom/S.sDateTo (state directly)
  if(fromVar==='S.sDateFrom'){
    S.sDateFrom=range.from;S.sDateTo=range.to;
  } else {
    // Audit/work_stats uses input IDs
    const fromEl=document.getElementById(fromVar);
    const toEl=document.getElementById(toVar);
    if(fromEl)fromEl.value=range.from;
    if(toEl)toEl.value=range.to;
  }
  renderAll();
}

/* ===== FIREBASE STORAGE FOR PHOTOS ===== */
let FBStorage=null;
async function initFirebaseStorage(){
  if(typeof firebase==='undefined')return null;
  try{
    if(!FBStorage&&firebase.storage){
      FBStorage=firebase.storage();
      console.log('[Oniroco] Firebase Storage initialized');
    }
    return FBStorage;
  }catch(e){
    console.warn('[Oniroco] Firebase Storage init failed:',e);
    return null;
  }
}

async function uploadPhotoToFirebase(base64DataUrl, path){
  const storage=await initFirebaseStorage();
  if(!storage)return null;  // Fallback to base64 storage
  try{
    const ref=storage.ref(path);
    const snapshot=await ref.putString(base64DataUrl,'data_url');
    const url=await snapshot.ref.getDownloadURL();
    console.log('[Oniroco] Photo uploaded:',path);
    return url;
  }catch(e){
    console.warn('[Oniroco] Photo upload failed:',e);
    return null;
  }
}

async function uploadIssuePhotos(issueId, photos){
  const uploaded=[];
  for(let i=0;i<photos.length;i++){
    const p=photos[i];
    if(p.startsWith('http'))continue;  // already URL
    const path='issues/'+issueId+'/photo-'+i+'-'+Date.now()+'.jpg';
    const url=await uploadPhotoToFirebase(p, path);
    uploaded.push(url||p);  // Use URL if uploaded, else keep base64
  }
  return uploaded;
}



/* ===== ISSUE ESCALATION TO TECH LEAD ===== */
const ESCALATION_DAYS=3;

function getOverdueIssues(){
  const issues=S.issues||[];
  const now=Date.now();
  const cutoff=now-(ESCALATION_DAYS*24*60*60*1000);
  return issues.filter(iss=>{
    if(iss.status==='resolved'||iss.status==='closed')return false;
    return iss.created<cutoff;
  });
}

async function checkEscalations(){
  if(!S.session)return;
  // Only run for admin and tech_lead
  if(!isAdmin()&&!isTechLead())return;
  // Don't run multiple times per day
  const lastCheck=LS.g('lastEscalationCheck');
  const today=new Date().toDateString();
  if(lastCheck===today)return;
  
  const overdue=getOverdueIssues();
  // Filter to only those not yet escalated (or escalated more than 1 day ago for re-reminders)
  const toEscalate=overdue.filter(iss=>{
    if(!iss.escalatedAt)return true;
    const daysSinceEscalation=(Date.now()-iss.escalatedAt)/(1000*60*60*24);
    return daysSinceEscalation>=1; // Re-remind every day
  });
  
  if(toEscalate.length===0){
    LS.s('lastEscalationCheck',today);
    return;
  }
  
  showEscalationBanner(toEscalate);
}

function showEscalationBanner(overdueIssues){
  // Don't show if dismissed today
  const today=new Date().toDateString();
  if(LS.g('escalationBannerDismissed')===today)return;
  
  const existing=document.getElementById('escalation-banner');
  if(existing)existing.remove();
  
  const banner=document.createElement('div');
  banner.id='escalation-banner';
  banner.style.cssText='position:fixed;top:60px;left:50%;transform:translateX(-50%);max-width:600px;width:calc(100% - 32px);background:linear-gradient(135deg,#FF453A,#FF9F0A);color:#fff;padding:14px 16px;border-radius:14px;z-index:900;box-shadow:0 8px 24px rgba(255,69,58,0.4);display:flex;align-items:center;gap:12px';
  banner.innerHTML=
    '<div style="font-size:24px">⚠️</div>'+
    '<div style="flex:1">'+
      '<div style="font-weight:700;font-size:14px">'+overdueIssues.length+' pranešimai neišspręsti virš '+ESCALATION_DAYS+' dienų</div>'+
      '<div style="font-size:12px;opacity:0.9">Reikia eskaluoti technikos vadovui</div>'+
    '</div>'+
    '<button id="esc-action" style="background:#fff;color:#FF453A;border:none;padding:8px 14px;border-radius:8px;font-weight:600;font-size:12px;cursor:pointer;white-space:nowrap">📧 Eskaluoti</button>'+
    '<button id="esc-dismiss" style="background:rgba(255,255,255,0.2);color:#fff;border:none;width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px">✕</button>';
  
  document.body.appendChild(banner);
  
  document.getElementById('esc-action').addEventListener('click',()=>{
    sendEscalationEmail(overdueIssues);
    banner.remove();
  });
  document.getElementById('esc-dismiss').addEventListener('click',()=>{
    LS.s('escalationBannerDismissed',today);
    banner.remove();
  });
}

async function sendEscalationEmail(overdueIssues){
  const techLeads=S.users.filter(u=>u.role==='tech_lead');
  if(techLeads.length===0){
    toast('⚠️ Nerasta technikos vadovų. Pridėkite vartotoją su "Technikos vadovas" role.');
    return;
  }
  
  const emails=techLeads.map(u=>{
    const emp=S.employees.find(e=>e.userId===u.id);
    return emp?emp.email:null;
  }).filter(Boolean);
  
  if(emails.length===0){
    toast('⚠️ Technikos vadovams nepriskirti el. paštai.');
    return;
  }
  
  // Build email
  const subject='[Oniroco IRC] '+overdueIssues.length+' pradelsti pranešimai (>'+ESCALATION_DAYS+' d.)';
  const lines=overdueIssues.map(iss=>{
    const days=Math.floor((Date.now()-iss.created)/(1000*60*60*24));
    const cat=ISSUE_CATEGORIES[iss.category]||ISSUE_CATEGORIES.other;
    const prio=ISSUE_PRIORITIES[iss.priority]||ISSUE_PRIORITIES.medium;
    const stat=ISSUE_STATUSES[iss.status]||ISSUE_STATUSES.new;
    return '• '+iss.title+'\n'+
           '  Įranga: '+iss.eqName+(iss.locName?' ('+iss.locName+')':'')+'\n'+
           '  Kategorija: '+cat.label+' | Skubumas: '+prio.label+' | Statusas: '+stat.label+'\n'+
           '  Pranešė: '+iss.reporterName+' | Pradelsta: '+days+' d.\n';
  }).join('\n');
  
  const body=
    'Sveiki,\n\n'+
    'Šie '+overdueIssues.length+' pranešimai neišspręsti virš '+ESCALATION_DAYS+' dienų:\n\n'+
    lines+'\n'+
    '---\n'+
    'Pilna informacija matoma Oniroco IRC programoje.\n'+
    'Programa: '+window.location.origin+'\n\n'+
    'Šis pranešimas atsiųstas automatiškai.';
  
  // Mark all as escalated
  for(const iss of overdueIssues){
    iss.escalatedAt=Date.now();
    if(!iss.escalations)iss.escalations=[];
    iss.escalations.push({ts:Date.now(),userId:S.session.userId,userName:S.session.name,emails});
    if(typeof FB!=='undefined'&&FB){try{await FB.collection('issues').doc(iss.id).set(iss)}catch(e){}}
  }
  await save('issues');
  logAction('ISSUE_ESCALATED','issue',{count:overdueIssues.length,note:'Eskaluota technikos vadovui'});
  
  // Mark today as checked
  LS.s('lastEscalationCheck',new Date().toDateString());
  
  // Open mailto
  window.location.href='mailto:'+emails.join(',')+'?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(body);
  toast('📧 Eskaluoti '+overdueIssues.length+' pranešimai');
  renderAll();
}

      updated:Date.now(),
      history:[{ts:Date.now(),userId:S.session.userId,userName:S.session.name,action:'created'}]
    };
    
    if(!S.issues)S.issues=[];
    S.issues.unshift(issue);

    if(photos.length>0&&typeof firebase!=='undefined'&&firebase.storage){
      try{
        const uploaded=await uploadIssuePhotos(issue.id, photos);
        if(uploaded.some(u=>u&&u.startsWith('http'))){
          issue.photos=uploaded;  // Replace base64 with URLs where successful
          console.log('[Oniroco] Photos uploaded to Firebase Storage');
        }
      }catch(e){

    }
    
    await save('issues');

    logAction('ISSUE_CREATED','issue',{id:issue.id,name:title,eqName:issue.eqName});
    
    ov.remove();
    
    // Offer to send email to tech experts
    const techExperts=S.users.filter(u=>u.role==='tech');

  });
}

async function compressImage(file, maxDim, quality){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      if(w>maxDim||h>maxDim){
        if(w>h){h=h*(maxDim/w);w=maxDim}else{w=w*(maxDim/h);h=maxDim}
      }
      const canvas=document.createElement('canvas');
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=reject;
    const reader=new FileReader();
    reader.onload=()=>{img.src=reader.result};
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function vIssues(){
  const issues=S.issues||[];
  const filter=S._issueFilter||'all';
  const search=(S._issueSearch||'').toLowerCase();
  
  let filtered=issues;
  if(filter==='open')filtered=filtered.filter(i=>i.status!=='resolved'&&i.status!=='closed');
  else if(filter==='active')filtered=filtered.filter(i=>i.status==='in_progress');
  else if(filter==='new')filtered=filtered.filter(i=>i.status==='new');
  else if(filter==='resolved')filtered=filtered.filter(i=>i.status==='resolved');
  else if(filter==='mine')filtered=filtered.filter(i=>i.assignedTo===S.session.userId);
  
  if(search){
    filtered=filtered.filter(i=>
      i.title.toLowerCase().includes(search)||
      (i.description||'').toLowerCase().includes(search)||
      (i.eqName||'').toLowerCase().includes(search)||
      (i.reporterName||'').toLowerCase().includes(search)
    );
  }
  
  // Sort: new first, then by priority desc, then by date desc
  filtered.sort((a,b)=>{
    const sa=a.status==='new'?0:a.status==='in_progress'?1:2;
    const sb=b.status==='new'?0:b.status==='in_progress'?1:2;
    if(sa!==sb)return sa-sb;
    const pa=(ISSUE_PRIORITIES[a.priority]||{}).sortVal||0;
    const pb=(ISSUE_PRIORITIES[b.priority]||{}).sortVal||0;
    if(pa!==pb)return pb-pa;
    return b.created-a.created;
  });
  
  const stats={
    total:issues.length,
    new:issues.filter(i=>i.status==='new').length,
    inProgress:issues.filter(i=>i.status==='in_progress').length,
    resolved:issues.filter(i=>i.status==='resolved').length
  };
  
  let h='<div style="margin-bottom:18px;display:flex;justify-content:space-between;align-items:flex-start">'+
    '<div><div style="font-size:26px;font-weight:700;letter-spacing:-0.6px">🛠 Pranešimai</div>'+
    '<div style="font-size:13px;color:var(--tx2);margin-top:2px">Įrangos problemų registras</div></div>'+
    (canReportIssues()?'<button class="btn bp" onclick="reportIssue(null)">+ Naujas pranešimas</button>':'')+

  // Stats cards
  h+='<div class="stats-g" style="margin-bottom:18px">'+
    '<div class="sc" onclick="S._issueFilter=\'all\';renderAll()" style="cursor:pointer;'+(filter==='all'?'border-color:var(--ac);background:var(--ac-dim)':'')+'"><div class="sc-n">'+stats.total+'</div><div class="sc-l">Iš viso</div></div>'+
    '<div class="sc" onclick="S._issueFilter=\'new\';renderAll()" style="cursor:pointer;'+(filter==='new'?'border-color:var(--ac);background:var(--ac-dim)':'')+'"><div class="sc-n" style="color:#0071E3">'+stats.new+'</div><div class="sc-l">Nauji</div></div>'+
    '<div class="sc" onclick="S._issueFilter=\'active\';renderAll()" style="cursor:pointer;'+(filter==='active'?'border-color:var(--ac);background:var(--ac-dim)':'')+'"><div class="sc-n" style="color:#FF9F0A">'+stats.inProgress+'</div><div class="sc-l">Sprendžiami</div></div>'+
    '<div class="sc" onclick="S._issueFilter=\'resolved\';renderAll()" style="cursor:pointer;'+(filter==='resolved'?'border-color:var(--ac);background:var(--ac-dim)':'')+'"><div class="sc-n" style="color:#34C759">'+stats.resolved+'</div><div class="sc-l">Išspręsti</div></div>'+
    '</div>';
  
  // Search
  h+='<div class="tbar"><input class="fi fi-search" type="text" placeholder="Ieškoti pagal antraštę, įrangą, pranešėją..." value="'+esc(search||'')+'" oninput="S._issueSearch=this.value;renderAll()"></div>';
  
  if(filtered.length===0){
    h+='<div class="empty"><div class="empty-i">🛠</div>'+(issues.length===0?'Pranešimų nėra':'Nėra atitinkančių filtrų')+'</div>';
    return h;
  }
  
  h+='<div class="list">';
  filtered.forEach(iss=>{
    const cat=ISSUE_CATEGORIES[iss.category]||ISSUE_CATEGORIES.other;
    const prio=ISSUE_PRIORITIES[iss.priority]||ISSUE_PRIORITIES.medium;
    const stat=ISSUE_STATUSES[iss.status]||ISSUE_STATUSES.new;
    const photoCount=(iss.photos||[]).length;
    const cmtCount=(iss.comments||[]).length;

    h+='<div class="lcard" onclick="openIssue(\''+iss.id+'\')" style="cursor:pointer;border-left:3px solid '+stat.color+'">'+
      '<div class="lcard-ico" style="background:'+cat.color+'22;color:'+cat.color+';width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center"><span style="width:22px;height:22px;display:inline-flex">'+(cat.svg||cat.ico)+'</span></div>'+

  });
  h+='</div>';
  return h;

async function changeIssueStatus(id, newStatus){
  const iss=S.issues.find(i=>i.id===id);
  if(!iss||iss.status===newStatus)return;
  const oldStatus=iss.status;
  iss.status=newStatus;
  iss.updated=Date.now();
  if(newStatus==='resolved')iss.resolvedAt=Date.now();
  if(!iss.history)iss.history=[];
  iss.history.push({ts:Date.now(),userId:S.session.userId,userName:S.session.name,action:'status_changed',from:oldStatus,to:newStatus});
  S.issues=S.issues.map(i=>i.id===id?iss:i);
  await save('issues');
  if(typeof FB!=='undefined'&&FB){try{await FB.collection('issues').doc(id).set(iss)}catch(e){}}
  logAction('ISSUE_STATUS_CHANGED','issue',{id,name:iss.title,note:oldStatus+' → '+newStatus});
  renderAll();
  toast('✅ Statusas pakeistas: '+(ISSUE_STATUSES[newStatus]||{}).label);
}

async function addIssueComment(id){
  const inp=document.getElementById('iss-cmt');
  if(!inp)return;
  const text=inp.value.trim();
  if(!text)return;
  const iss=S.issues.find(i=>i.id===id);
  if(!iss)return;
  if(!iss.comments)iss.comments=[];
  iss.comments.push({
    id:uid(),
    ts:Date.now(),
    userId:S.session.userId,
    userName:S.session.name,
    role:S.session.role,
    text
  });
  iss.updated=Date.now();
  S.issues=S.issues.map(i=>i.id===id?iss:i);
  await save('issues');
  if(typeof FB!=='undefined'&&FB){try{await FB.collection('issues').doc(id).set(iss)}catch(e){}}
  logAction('ISSUE_COMMENT','issue',{id,name:iss.title});
  inp.value='';
  renderAll();
}

function openImageViewer(issueId, idx){
  const iss=S.issues.find(i=>i.id===issueId);
  if(!iss||!iss.photos||!iss.photos[idx])return;
  const ov=document.createElement('div');
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;z-index:2000;cursor:zoom-out';
  ov.addEventListener('click',()=>ov.remove());
  ov.innerHTML='<img src="'+iss.photos[idx]+'" style="max-width:95%;max-height:95%;object-fit:contain"><button style="position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.2);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:18px;cursor:pointer">✕</button>';
  document.body.appendChild(ov);
}

async function addToPlan(evtId, eqId){
  const evt=S.events.find(e=>e.id===evtId);
  const eq=S.eq.find(e=>e.id===eqId);
  if(!evt||!eq)return;
  if(!evt.plan)evt.plan=[];
  if(evt.plan.find(p=>p.eqId===eqId)){toast('Jau sąraše!');return}
  // Check same-day conflict
  if(evt.date){
    const conflict=S.events.find(e=>e.id!==evtId&&e.date===evt.date&&!e.archived&&(e.plan||[]).find(p=>p.eqId===eqId));
    if(conflict){
      showConfirmDialog('⚠️ Datos konfliktas',
        '„'+eq.name+'" jau yra renginio „'+conflict.name+'" plane tą pačią dieną ('+evt.date+'). Vis tiek pridėti?',
        'Pridėti vis tiek',()=>doAddToPlan(evtId, eqId));
      return;
    }
  }
  doAddToPlan(evtId, eqId);
}

async function doAddToPlan(evtId, eqId){
  const evt=S.events.find(e=>e.id===evtId);
  const eq=S.eq.find(e=>e.id===eqId);
  if(!evt||!eq)return;
  if(!evt.plan)evt.plan=[];
  if(evt.plan.find(p=>p.eqId===eqId))return;
  evt.plan.push({eqId,eqName:eq.name,addedBy:S.session.name,addedAt:Date.now(),takenTs:null,takenBy:null,assignedUserId:null,assignedUserName:null,mustHave:false});
  logAction('PLAN_ADDED','event',{id:evtId,name:evt.name,eqName:eq.name});
  S.events=S.events.map(e=>e.id===evtId?evt:e);
  await save('events',evtId)
  renderAll();toast('✅ Pridėta: '+eq.name);
}

async function removeFromPlan(evtId, eqId){
  const evt=S.events.find(e=>e.id===evtId);if(!evt)return;
  const planItem=(evt.plan||[]).find(p=>p.eqId===eqId);
  evt.plan=(evt.plan||[]).filter(p=>p.eqId!==eqId);
  S.events=S.events.map(e=>e.id===evtId?evt:e);
  await save('events',evtId)
  if(planItem){logAction('PLAN_REMOVED','event',{id:evtId,name:evt.name,eqName:planItem.eqName||''})}
  renderAll();toast('🗑️ Pašalinta iš plano');
}

async function markTaken(evtId, eqId, scannerMode){
  const evt=S.events.find(e=>e.id===evtId);if(!evt)return;
  const plan=evt.plan||[];
  const item=plan.find(p=>p.eqId===eqId);
  if(!item){toast('Įranga nerasta plane!');return}
  if(item.takenTs){toast('Jau pažymėta kaip paimta!');return}
  item.takenTs=Date.now();
  item.takenBy=S.session.name;
  // Also mark equipment as taken in main list
  const eq=S.eq.find(e=>e.id===eqId);
  if(eq&&eq.s==='a'){
    S.eq=S.eq.map(e=>e.id===eqId?{...e,s:'o',byId:S.session.userId,byName:S.session.name,at:Date.now(),evtId,reservation:null}:e);
    const tx={id:uid(),eid:eqId,en:eq.name,tp:'o',p:S.session.name,pId:S.session.userId,evtId,evN:evt.name,ts:Date.now()};
    S.tx.unshift(tx);
    await save('tx');
    await save('eq');
  }
  S.events=S.events.map(e=>e.id===evtId?evt:e);
  await save('events',evtId)
  if(eq){logAction('PLAN_TAKEN','event',{id:evtId,name:evt.name,eqName:eq.name})}
  if(scannerMode){S.scan='idle';S.scanItem=null}
  renderAll();
  const allTaken=(evt.plan||[]).every(p=>p.takenTs);
  toast(allTaken?'🎉 Visa įranga paimta!':'✅ Pažymėta: '+(eq?eq.name:eqId));
}

/* ===== CHARTS ===== */
function renderCharts(){
  Object.values(S.chartInst).forEach(c=>{try{c.destroy()}catch(e){}});
  S.chartInst={};
  const isDark=S.theme!=='light';
  const tc=isDark?'rgba(255,255,255,0.42)':'rgba(0,0,0,0.42)';
  const gc=isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.06)';
  const c1=document.getElementById('chart-status');
  if(c1&&window.Chart){
    const avail=S.eq.filter(e=>e.s==='a').length;
    const out=S.eq.filter(e=>e.s==='o').length;
    const res=S.eq.filter(e=>e.s==='r').length;
    S.chartInst.status=new Chart(c1,{
      type:'doughnut',
      data:{labels:['Laisva','Paimta','Rezervuota'],datasets:[{data:[avail,out,res],backgroundColor:['rgba(48,209,88,0.85)','rgba(255,69,58,0.85)','rgba(255,159,10,0.85)'],borderWidth:0,hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{color:tc,font:{size:11},padding:10,boxWidth:10,boxHeight:10}}},cutout:'66%'}
    });
  }
  const c2=document.getElementById('chart-activity');
  if(c2&&window.Chart){
    const labels=[];const outD=[];const inD=[];
    for(let i=13;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const ds=new Date(d.toDateString()).getTime();
      labels.push(d.toLocaleDateString('lt-LT',{month:'short',day:'numeric'}));
      outD.push(S.tx.filter(t=>t.tp==='o'&&t.ts>=ds&&t.ts<ds+86400000).length);
      inD.push(S.tx.filter(t=>t.tp==='i'&&t.ts>=ds&&t.ts<ds+86400000).length);
    }
    S.chartInst.activity=new Chart(c2,{
      type:'bar',
      data:{labels,datasets:[{label:'Paėmimai',data:outD,backgroundColor:'rgba(255,69,58,0.72)',borderRadius:4,borderSkipped:false},{label:'Grąžinimai',data:inD,backgroundColor:'rgba(48,209,88,0.72)',borderRadius:4,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:tc,font:{size:11},boxWidth:10,boxHeight:10}}},scales:{x:{grid:{color:gc,drawBorder:false},ticks:{color:tc,font:{size:10},maxRotation:0}},y:{grid:{color:gc,drawBorder:false},ticks:{color:tc,font:{size:10},stepSize:1},beginAtZero:true}}}
    });
  }
}

/* ===== OVERDUE NOTIFICATION ===== */
function checkOverdueNotif(){
  const over=S.eq.filter(e=>e.s==='o'&&e.at&&(Date.now()-e.at)>S.overdueH*3600000);
  if(!over.length)return;
  if(!('Notification' in window))return;
  if(Notification.permission==='granted'){
    new Notification('Oniroco — Vėluojanti įranga',{body:over.length+' vnt. negrąžinta laiku: '+over.slice(0,2).map(function(e){return e.name}).join(', ')});
  }else if(Notification.permission==='default'){
    Notification.requestPermission();
  }
}

/* ===== CALENDAR ===== */
function setCalMonth(offset){
  S.calM+=offset;
  while(S.calM>11){S.calM-=12;S.calY++}
  while(S.calM<0){S.calM+=12;S.calY--}
  renderAll();
}
function setCalRange(months){
  S.calMonths=months;
  if(months>0){
    // Switching from week to month view — clear week start
    S.calWeekStart=null;
  }
  renderAll();
}
function setCalWeek(){
  // Switch to week view — set start to current week's Monday (if not set)
  if(!S.calWeekStart){
    const t=new Date();
    const dow=(t.getDay()+6)%7; // 0=Mon, 6=Sun
    t.setDate(t.getDate()-dow);
    S.calWeekStart=t.toISOString().slice(0,10);
  }
  S.calMonths=0; // 0 = week mode
  renderAll();
}
function shiftWeek(days){
  if(!S.calWeekStart)return;
  const d=new Date(S.calWeekStart+'T12:00:00');
  d.setDate(d.getDate()+days);
  S.calWeekStart=d.toISOString().slice(0,10);
  renderAll();
}
function jumpToToday(){
  const t=new Date();
  S.calY=t.getFullYear();
  S.calM=t.getMonth();
  // Also update week start if in week mode
  if(S.calMonths===0){
    const dow=(t.getDay()+6)%7;
    t.setDate(t.getDate()-dow);
    S.calWeekStart=t.toISOString().slice(0,10);
  }
  renderAll();
}

// Handle drag-drop of an event onto a new day cell
async function handleEventDrop(newDateStr,e){
  if(e&&e.preventDefault)e.preventDefault();
  if(!e||!e.dataTransfer)return;
  const evtId=e.dataTransfer.getData('text/evtId');
  if(!evtId)return;
  const evtObj=S.events.find(x=>x.id===evtId);
  if(!evtObj)return;
  const oldStart=evtObj.startDate||evtObj.date;
  if(!oldStart||oldStart===newDateStr)return;
  // Calculate duration
  const oldEnd=evtObj.endDate||evtObj.date||oldStart;
  const oldStartD=new Date(oldStart+'T12:00:00');
  const oldEndD=new Date(oldEnd+'T12:00:00');
  const durationDays=Math.round((oldEndD-oldStartD)/(86400000));
  const isMultiDay=durationDays>0;
  const newStartD=new Date(newDateStr+'T12:00:00');
  const newEndD=new Date(newStartD);
  newEndD.setDate(newEndD.getDate()+durationDays);
  const newEndStr=newEndD.toISOString().slice(0,10);
  
  // For multi-day events, ask for confirmation (Lithuanian)
  if(isMultiDay){
    const msg=`Perkelti renginį „${evtObj.name}"?\n\n`+
      `Iš: ${oldStart} → ${oldEnd} (${durationDays+1} d.)\n`+
      `Į: ${newDateStr} → ${newEndStr} (${durationDays+1} d.)\n\n`+
      `Renginys yra kelių dienų — bus perkeltas išlaikant trukmę (${durationDays+1} dienas).`;
    if(!confirm(msg))return;
  }
  
  // Update event data
  evtObj.startDate=newDateStr;
  evtObj.date=newDateStr;
  if(isMultiDay){
    evtObj.endDate=newEndStr;
  } else {
    // Single-day event — clean up endDate to avoid confusion
    if(evtObj.endDate)evtObj.endDate=newDateStr;
  }
  
  try{
    await save('events');
    logAction('EVT_RESCHEDULED','event',{id:evtId,name:evtObj.name,oldDate:oldStart,newDate:newDateStr});
    if(isMultiDay){
      toast('📅 „'+evtObj.name+'" perkeltas: '+newDateStr+' → '+newEndStr+' ('+(durationDays+1)+' d.)');
    } else {
      toast('📅 „'+evtObj.name+'" perkeltas: '+oldStart+' → '+newDateStr);
    }
  }catch(err){
    console.error('Failed to reschedule event',err);
    toast('⚠️ Klaida perkeliant renginį');
  }
  renderAll();
}

// Maximum events shown directly in a calendar cell before "+N more"
const CAL_MAX_EVENTS=3;

// === Lithuanian holidays helpers ===
// Calculate Easter Sunday using Gregorian algorithm
function calcEaster(year){
  const a=year%19;
  const b=Math.floor(year/100);
  const c=year%100;
  const d=Math.floor(b/4);
  const e=b%4;
  const f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3);
  const h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4);
  const k=c%4;
  const l=(32+2*e+2*i-h-k)%7;
  const mn=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*mn+114)/31); // 3=Mar, 4=Apr
  const day=((h+l-7*mn+114)%31)+1;
  return new Date(year,month-1,day);
}

// First Sunday of given month (year, monthIdx 0-11) → date number
function firstSundayOf(year,monthIdx){
  const d=new Date(year,monthIdx,1);
  const dow=d.getDay(); // 0=Sun
  return dow===0?1:(8-dow);
}

const _holidayCache={};
// Get all Lithuanian official holidays for a year (returns map dateStr → name)
function getLithuanianHolidays(year){
  if(_holidayCache[year])return _holidayCache[year];
  const easter=calcEaster(year);
  const easterMon=new Date(easter);easterMon.setDate(easterMon.getDate()+1);
  const easterStr=easter.toISOString().slice(0,10);
  const easterMonStr=easterMon.toISOString().slice(0,10);
  const motherDay=firstSundayOf(year,4); // May
  const fatherDay=firstSundayOf(year,5); // June
  const pad=n=>String(n).padStart(2,'0');
  const map={
    [`${year}-01-01`]:'Naujieji metai',
    [`${year}-02-16`]:'Lietuvos valstybės atkūrimo diena',
    [`${year}-03-11`]:'Nepriklausomybės atkūrimo diena',
    [easterStr]:'Velykos',
    [easterMonStr]:'Antroji Velykų diena',
    [`${year}-05-01`]:'Tarptautinė darbo diena',
    [`${year}-05-${pad(motherDay)}`]:'Motinos diena',
    [`${year}-06-${pad(fatherDay)}`]:'Tėvo diena',
    [`${year}-06-24`]:'Rasos ir Joninės',
    [`${year}-07-06`]:'Valstybės diena',
    [`${year}-08-15`]:'Žolinė',
    [`${year}-11-01`]:'Visų Šventųjų diena',
    [`${year}-11-02`]:'Vėlinės',
    [`${year}-12-24`]:'Kūčios',
    [`${year}-12-25`]:'Kalėdos',
    [`${year}-12-26`]:'Antroji Kalėdų diena',
  };
  _holidayCache[year]=map;
  return map;
}

// Get holiday name for a date string YYYY-MM-DD, or null
function holidayFor(dateStr){
  if(!dateStr||dateStr.length<10)return null;
  const year=parseInt(dateStr.substring(0,4));
  if(isNaN(year))return null;
  const holidays=getLithuanianHolidays(year);
  return holidays[dateStr]||null;
}

// Check if date is weekend (Sat or Sun)
function isWeekendDate(dateStr){
  if(!dateStr||dateStr.length<10)return false;
  const d=new Date(dateStr+'T12:00:00');
  const dow=d.getDay();
  return dow===0||dow===6;
}

function renderSingleMonth(y,m,filterFn,compact){
  const mn=['Sausis','Vasaris','Kovas','Balandis','Gegužė','Birželis','Liepa','Rugpjūtis','Rugsėjis','Spalis','Lapkritis','Gruodis'];
  const dn=['Pr','An','Tr','Kt','Pn','Š','Sk'];
  const first=new Date(y,m,1);
  const last=new Date(y,m+1,0);
  const startDow=(first.getDay()+6)%7;
  const todayStr=new Date().toISOString().slice(0,10);
  const cells=[];
  const prevLast=new Date(y,m,0).getDate();
  for(var i=startDow-1;i>=0;i--)cells.push({day:prevLast-i,other:true,ds:null});
  for(var d=1;d<=last.getDate();d++){
    var ds=y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    cells.push({day:d,other:false,ds:ds});
  }
  var rem=(7-cells.length%7)%7;
  for(var d2=1;d2<=rem;d2++)cells.push({day:d2,other:true,ds:null});
  
  // Compact mode: smaller cells, fewer events visible
  const maxEvents=compact?4:CAL_MAX_EVENTS;
  
  // Count events in this month for header
  var monthEvts=S.events.filter(function(e){
    if(e.deleted)return false;
    if(filterFn&&!filterFn(e))return false;
    var start=e.startDate||e.date;
    if(!start)return false;
    var ymd=start.split('-');
    return parseInt(ymd[0])===y&&parseInt(ymd[1])===m+1;
  }).length;
  
  var html='<div style="margin-bottom:14px"><div style="font-size:14px;font-weight:700;letter-spacing:-0.2px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between"><span>📅 '+mn[m]+' '+y+'</span>'+(monthEvts>0?'<span style="background:var(--ac-dim);color:var(--ac);font-size:11px;padding:2px 8px;border-radius:99px;font-weight:600">'+monthEvts+'</span>':'<span style="font-size:11px;color:var(--tx2);font-weight:500">tuščias</span>')+'</div>';
  html+='<div class="cal-dh">'+dn.map(function(d,i){return'<div class="cal-dl'+(i>=5?' weekend':'')+'">'+d+'</div>'}).join('')+'</div>';
  html+='<div class="cal-grid'+(compact?' compact':'')+'">';
  cells.forEach(function(cell){
    if(cell.other){html+='<div class="cal-cell dim"><div class="cal-num">'+cell.day+'</div></div>';return}
    var evts=S.events.filter(function(e){
      if(e.deleted)return false;
      if(filterFn&&!filterFn(e))return false;
      var start=e.startDate||e.date;
      var end=e.endDate||e.date||start;
      if(!start)return false;
      return cell.ds>=start && cell.ds<=end;
    });
    var isToday=cell.ds===todayStr;
    var holidayName=holidayFor(cell.ds);
    var isHol=!!holidayName;
    var isWknd=isWeekendDate(cell.ds);
    var cellClasses='cal-cell';
    if(isToday)cellClasses+=' today';
    if(isHol)cellClasses+=' holiday';
    else if(isWknd)cellClasses+=' weekend';
    // Make cell clickable to show day popup OR create new event if empty
    var cellClick=evts.length>0
      ? `showDayEventsPopup('${cell.ds}')`
      : `openNewEventOnDate('${cell.ds}')`;
    var cellTitle=holidayName?holidayName+' (nedarbo diena)':isWknd?'Savaitgalis':(evts.length>0?'Spauskite — visi tos dienos renginiai':'Spauskite — sukurti naują renginį');
    // Drop target attributes for drag-and-drop (only in non-compact mode)
    var dropAttrs=compact?'':' ondragover="event.preventDefault();event.dataTransfer.dropEffect=\'move\';this.classList.add(\'drag-over\')" ondragleave="this.classList.remove(\'drag-over\')" ondrop="this.classList.remove(\'drag-over\');handleEventDrop(\''+cell.ds+'\',event)"';
    html+='<div class="'+cellClasses+'" style="cursor:pointer"'+dropAttrs+' onclick="'+cellClick+'" title="'+esc(cellTitle)+'">'
      +'<div class="cal-num">'+(isToday?'<span>'+cell.day+'</span>':cell.day)+'</div>';
    
    // Show first maxEvents events, "+N more" link if more
    var visibleEvts=evts.slice(0,maxEvents);
    var hiddenCount=evts.length-maxEvents;
    visibleEvts.forEach(function(e){
      var c=EVT_CATS[e.category||EVT_CAT_DEFAULT]||EVT_CATS.other;
      var start=e.startDate||e.date;
      var end=e.endDate||e.date||start;
      var isStart=cell.ds===start;
      var isMultiDay=start!==end;
      var indicator=isMultiDay?(isStart?'▶ ':cell.ds===end?'◀ ':'━ '):'';
      var bg=c.bg;
      var leftBorder=isStart||!isMultiDay?'2px solid '+c.color:'2px solid transparent';
      // Drag attributes only on the start day (so multi-day events drag from origin) and only in non-compact mode
      var dragAttrs=(!compact&&isStart)?' draggable="true" ondragstart="event.stopPropagation();event.dataTransfer.setData(\'text/evtId\',\''+e.id+'\');event.dataTransfer.effectAllowed=\'move\';this.style.opacity=\'0.4\'" ondragend="this.style.opacity=\'1\'"':'';
      // Prevent cell click when clicking event
      html+='<div class="cal-ev"'+dragAttrs+' title="'+esc(e.name)+' ('+c.label+')'+(isMultiDay?' • '+start+' → '+end:'')+(!compact&&isStart?' • Tempkite, kad perkeltumėte':'')+'" onclick="event.stopPropagation();S.viewEvtId=\''+e.id+'\';renderAll()" style="cursor:'+(!compact&&isStart?'grab':'pointer')+';background:'+bg+';color:'+c.color+';border-left:'+leftBorder+(isMultiDay&&!isStart?';margin-left:-2px':'')+';display:flex;align-items:center;gap:4px;padding:2px 5px">'+(isStart?'<span style="width:10px;height:10px;display:inline-flex;flex-shrink:0">'+(c.svg||c.ico)+'</span>':'<span style="width:10px"></span>')+'<span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+indicator+esc(e.name)+'</span></div>';
    });
    if(hiddenCount>0){
      html+='<div class="cal-more" onclick="event.stopPropagation();showDayEventsPopup(\''+cell.ds+'\')" style="cursor:pointer;font-size:10px;color:var(--ac);font-weight:600;padding:2px 5px;border-radius:4px;background:var(--ac-dim);margin-top:1px;text-align:center">+'+hiddenCount+' daugiau</div>';
    }
    html+='</div>';
  });
  html+='</div></div>';
  return html;
}

function renderCalendar(filterFn){
  // Stash filterFn so showDayEventsPopup can use it
  window.__currentCalFilterFn=filterFn||null;
  
  const months=S.calMonths===0?0:(S.calMonths||1);
  const isWeek=months===0;
  const mn=['Sausis','Vasaris','Kovas','Balandis','Gegužė','Birželis','Liepa','Rugpjūtis','Rugsėjis','Spalis','Lapkritis','Gruodis'];
  const y=S.calY,m=S.calM;
  // Header with navigation + range buttons
  let nav='<div style="background:var(--sf2);border-radius:14px;padding:10px;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:space-between">';
  nav+='<div style="display:flex;align-items:center;gap:6px">';
  if(isWeek){
    nav+='<button class="btn btn-sm" onclick="shiftWeek(-7)" title="Praėjusi savaitė">←</button>';
    nav+='<button class="btn btn-sm" onclick="jumpToToday()" title="Šios savaitės">Šiandien</button>';
    nav+='<button class="btn btn-sm" onclick="shiftWeek(7)" title="Kita savaitė">→</button>';
    if(S.calWeekStart){
      const ws=new Date(S.calWeekStart+'T12:00:00');
      const we=new Date(ws);we.setDate(we.getDate()+6);
      nav+='<span style="font-size:13px;font-weight:700;margin-left:8px">'+ws.getDate()+' '+mn[ws.getMonth()].slice(0,3)+' → '+we.getDate()+' '+mn[we.getMonth()].slice(0,3)+' '+we.getFullYear()+'</span>';
    }
  } else {
    nav+='<button class="btn btn-sm" onclick="setCalMonth(-1)" title="Atgal mėnesį">←</button>';
    nav+='<button class="btn btn-sm" onclick="jumpToToday()" title="Šiandien">Šiandien</button>';
    nav+='<button class="btn btn-sm" onclick="setCalMonth(1)" title="Kitą mėnesį">→</button>';
    if(months===1){
      nav+='<span style="font-size:14px;font-weight:700;margin-left:8px">'+mn[m]+' '+y+'</span>';
    } else {
      const endM=(m+months-1)%12;
      const endY=y+Math.floor((m+months-1)/12);
      nav+='<span style="font-size:13px;font-weight:600;margin-left:8px;color:var(--tx2)">'+mn[m]+' '+y+' → '+mn[endM]+' '+endY+'</span>';
    }
  }
  nav+='</div>';
  // Range selector
  nav+='<div class="vtoggle" style="background:var(--sf);border:0.5px solid var(--bo)">';
  nav+='<button class="vt'+(isWeek?' on':'')+'" onclick="setCalWeek()" style="font-size:11px;padding:5px 10px">1 sav</button>';
  [[1,'1 mėn'],[3,'3 mėn'],[6,'6 mėn'],[12,'12 mėn']].forEach(([n,label])=>{
    nav+='<button class="vt'+(months===n?' on':'')+'" onclick="setCalRange('+n+')" style="font-size:11px;padding:5px 10px">'+label+'</button>';
  });
  nav+='</div>';
  nav+='</div>';
  
  // Render body
  let body='';
  if(isWeek){
    body=renderWeekView(filterFn);
  } else if(months>1){
    // Adjust grid columns based on month count for better readability
    const cols=months<=3?'repeat(auto-fit,minmax(300px,1fr))':months<=6?'repeat(auto-fit,minmax(260px,1fr))':'repeat(auto-fit,minmax(220px,1fr))';
    body+='<div style="display:grid;grid-template-columns:'+cols+';gap:14px">';
    for(let i=0;i<months;i++){
      const mm=(m+i)%12;
      const yy=y+Math.floor((m+i)/12);
      body+=renderSingleMonth(yy,mm,filterFn,true); // compact=true
    }
    body+='</div>';
  } else {
    body+=renderSingleMonth(y,m,filterFn,false);
  }
  
  return nav+body;
}
