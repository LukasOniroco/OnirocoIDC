// === Change event creator (admin only) ===
function openChangeCreatorModal(evtId){
  console.log('[openChangeCreatorModal] called with evtId:',evtId);
  
  const evt=S.events.find(e=>e.id===evtId);
  if(!evt){
    console.error('[openChangeCreatorModal] event not found:',evtId);
    toast('❌ Renginys nerastas');
    return;
  }
  
  if(!isAdmin()){
    toast('Tik administratorius gali keisti kūrėją');
    return;
  }
  
  // Build list of eligible users (everyone with relevant role)
  const eligibleUsers=S.users.filter(u=>{
    return u.role==='event_org'||u.role==='admin'||u.role==='tech_lead';
  });
  
  if(eligibleUsers.length===0){
    toast('❌ Nėra tinkamų vartotojų');
    return;
  }
  
  // Sort: event_org first, then admin, then tech_lead, alphabetically within each
  eligibleUsers.sort((a,b)=>{
    const order={event_org:0,admin:1,tech_lead:2};
    const oa=order[a.role]!==undefined?order[a.role]:99;
    const ob=order[b.role]!==undefined?order[b.role]:99;
    if(oa!==ob)return oa-ob;
    return (a.name||'').localeCompare(b.name||'');
  });
  
  const currentId=evt.createdById||'';
  
  // Remove old modal if exists
  let oldModal=document.getElementById('change-creator-modal');
  if(oldModal)oldModal.remove();
  
  // Build user list HTML
  let usersHtml='';
  eligibleUsers.forEach(u=>{
    const emp=S.employees.find(e=>e.userId===u.id);
    const photo=emp&&emp.photo?emp.photo:(u.photo||null);
    const isCurrent=u.id===currentId;
    const roleLabel=ROLES[u.role]||u.role;
    
    const avatarBg=photo?'transparent':'var(--ac-dim)';
    const avatarContent=photo
      ?'<img src="'+esc(photo)+'" style="width:100%;height:100%;object-fit:cover">'
      :initials(u.name||'?');
    
    const cardBg=isCurrent?'var(--ac-dim)':'var(--sf2)';
    const cardBorder=isCurrent?'var(--ac)':'var(--bo)';
    const currentBadge=isCurrent?'<span style="font-size:10px;color:var(--ac);font-weight:700;padding:2px 8px;background:rgba(0,113,227,0.2);border-radius:99px">DABAR</span>':'';
    
    usersHtml+='<button onclick="changeEventCreator(\''+evt.id+'\',\''+u.id+'\')" '
      +'style="display:flex;align-items:center;gap:10px;padding:10px;'
      +'background:'+cardBg+';border:1px solid '+cardBorder+';border-radius:10px;'
      +'cursor:pointer;text-align:left;width:100%;transition:.15s;font-family:inherit">'
      +'<div style="width:36px;height:36px;border-radius:50%;background:'+avatarBg
      +';color:var(--ac);display:flex;align-items:center;justify-content:center;'
      +'font-size:12px;font-weight:700;flex-shrink:0;overflow:hidden">'+avatarContent+'</div>'
      +'<div style="flex:1;min-width:0">'
      +'<div style="font-size:14px;font-weight:600;color:var(--tx)">'+esc(u.name||'(be vardo)')+'</div>'
      +'<div style="font-size:11px;color:var(--tx2)">'+esc(roleLabel)+'</div>'

async function changeEventCreator(evtId,newUserId){
  const evt=S.events.find(e=>e.id===evtId);
  const newUser=S.users.find(u=>u.id===newUserId);
  if(!evt||!newUser){toast('Klaida');return}
  
  const oldName=getEvtCreatorName(evt)||'(nežinoma)';
  
  evt.createdById=newUserId;
  evt.createdBy=newUser.name;
  
  await save('events',evt.id);
  logAction('EVT_CREATOR_CHANGED','event',{
    id:evt.id,
    name:evt.name,
    oldCreator:oldName,
    newCreator:newUser.name,
  });
  
  closeChangeCreatorModal();
  toast('✅ Kūrėjas pakeistas: '+newUser.name);
  renderAll();
}

// ===== GLOBAL CLICK DELEGATION FOR RETURN BUTTONS =====
function handleReturnClick(ev){
  const btn=ev.target.closest('[data-return-eq]');
  if(!btn)return;
  // Prevent double-fire from click + touchend
  if(btn._returning)return;
  btn._returning=true;
  setTimeout(()=>{btn._returning=false},1000);
  ev.preventDefault();ev.stopPropagation();
  const eqId=btn.getAttribute('data-return-eq');
  console.log('[Oniroco] Return button activated for',eqId);
  if(eqId&&typeof quickReturn==='function'){
    quickReturn(eqId);
  } else {
    console.error('quickReturn not available');
    alert('Klaida: grąžinimo funkcija nerasta');
  }
}
document.addEventListener('click',handleReturnClick,true);



/* ===== UNIFIED PEOPLE MIGRATION ===== */

async function migrateRoles(){
  let changed=false;
  S.users.forEach(u=>{
    if(u.role==='op_in'){u.role='op_out';changed=true}
  });
  if(changed){await save('users');console.log('[Oniroco] Roles migrated')}
}

async function migratePeople(){
  let changed=false;
  S.users.forEach(u=>{
    let emp=S.employees.find(e=>e.userId===u.id||e.name===u.name);
    if(!emp){
      const newEmp={id:uid(),name:u.name,userId:u.id,dept:'',phone:u.phone||'',email:u.email||'',note:'',created:u.created||Date.now()};
      S.employees.push(newEmp);changed=true;
    } else if(!emp.userId){
      emp.userId=u.id;
      if(!emp.phone&&u.phone)emp.phone=u.phone;
      if(!emp.email&&u.email)emp.email=u.email;
      changed=true;
    }
  });
  if(changed){await save('employees');console.log('[Oniroco] People migrated')}
  
  // Migrate departments from existing employee values
  if(!S.depts)S.depts=[];
  let deptsChanged=false;
  S.employees.forEach(e=>{
    if(e.dept&&e.dept.trim()&&!S.depts.find(d=>d.name===e.dept)){
      S.depts.push({id:uid(),name:e.dept.trim(),created:Date.now()});
      deptsChanged=true;
    }
  });
  if(deptsChanged){await save('depts');console.log('[Oniroco] Departments migrated')}
}

async function addDept(name){
  name=(name||'').trim();
  if(!name)return null;
  const existing=S.depts.find(d=>d.name.toLowerCase()===name.toLowerCase());
  if(existing)return existing;
  const dept={id:uid(),name,created:Date.now()};
  S.depts.push(dept);
  await save('depts');
  if(typeof FB!=='undefined'&&FB){try{await FB.collection('departments').doc(dept.id).set(dept)}catch(e){}}
  return dept;
}

async function deleteDept(id){
  S.depts=S.depts.filter(d=>d.id!==id);
  await save('depts');
  if(typeof FB!=='undefined'&&FB){try{await FB.collection('departments').doc(id).delete()}catch(e){}}
}

window.handleDeptChange=function(sel){
  if(sel.value==='__new__'){
    sel.value=sel.dataset.prevValue||'';
    showAddDeptDialog(name=>{
      if(!name)return;
      addDept(name).then(d=>{
        if(d){
          const newOpt=document.createElement('option');
          newOpt.value=d.name;newOpt.textContent=d.name;newOpt.selected=true;
          const newOptIdx=Array.from(sel.options).findIndex(o=>o.value==='__new__');
          if(newOptIdx>=0)sel.insertBefore(newOpt, sel.options[newOptIdx]);
          else sel.appendChild(newOpt);
          sel.value=d.name;
          sel.dataset.prevValue=d.name;
          toast('✅ Padalinys „'+d.name+'" pridėtas');
        }
      });
    });
  } else {
    sel.dataset.prevValue=sel.value;
  }
}

function showAddDeptDialog(onConfirm){
  const existing=document.getElementById('add-dept-dlg');if(existing)existing.remove();
  const ov=document.createElement('div');ov.id='add-dept-dlg';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px';
  ov.addEventListener('click',e=>{if(e.target===ov){ov.remove();onConfirm(null)}});
  const card=document.createElement('div');
  card.style.cssText='background:var(--sf);border:0.5px solid var(--bo);border-radius:20px;padding:24px;max-width:400px;width:100%;box-shadow:0 20px 50px rgba(0,0,0,0.5)';
  card.innerHTML=
    '<div style="font-size:18px;font-weight:700;margin-bottom:14px">🏢 Naujas padalinys</div>'+
    '<div class="fg"><label class="fl">Padalinio pavadinimas</label><input class="fi" type="text" id="new-dept-input" placeholder="pvz. Vilnius, Kaunas, IT skyrius..." style="font-size:16px"></div>'+
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">'+
      '<button class="btn" id="dept-cancel">Atšaukti</button>'+
      '<button class="btn bp" id="dept-ok">✅ Pridėti</button>'+
    '</div>';
  ov.appendChild(card);document.body.appendChild(ov);
  setTimeout(()=>{const i=document.getElementById('new-dept-input');if(i)i.focus()},100);
  document.getElementById('dept-cancel').addEventListener('click',()=>{ov.remove();onConfirm(null)});
  const ok=()=>{
    const v=document.getElementById('new-dept-input').value.trim();
    ov.remove();
    onConfirm(v||null);
  };
  document.getElementById('dept-ok').addEventListener('click',ok);
  document.getElementById('new-dept-input').addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();ok()}
    if(e.key==='Escape'){ov.remove();onConfirm(null)}
  });
}
