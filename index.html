  if(fEq!=='all')filtered=filtered.filter(s=>s.eqId===fEq);
  if(fFrom)filtered=filtered.filter(s=>s.startTs>=new Date(fFrom).getTime());
  if(fTo)filtered=filtered.filter(s=>s.startTs<=new Date(fTo).getTime()+86399999);

  // Per-tech summary
  const techMap={};
  filtered.forEach(s=>{
    if(!techMap[s.techName])techMap[s.techName]={name:s.techName,count:0,totalH:0,eqs:new Set()};
    techMap[s.techName].count++;
    techMap[s.techName].totalH+=s.durationH;
    techMap[s.techName].eqs.add(s.eqName);
  });
  const techList=Object.values(techMap).sort((a,b)=>b.totalH-a.totalH);
  const maxH=techList.length?techList[0].totalH:1;

  // Per-equipment summary
  const eqMap={};
  filtered.forEach(s=>{
    if(!eqMap[s.eqName])eqMap[s.eqName]={name:s.eqName,count:0,totalH:0};
    eqMap[s.eqName].count++;
    eqMap[s.eqName].totalH+=s.durationH;
  });
  const eqList=Object.values(eqMap).sort((a,b)=>b.totalH-a.totalH).slice(0,8);
  const maxEqH=eqList.length?eqList[0].totalH:1;

  // Unique techs and equipment for filters
  const techs=[...new Set(sessions.map(s=>JSON.stringify({id:s.techId,name:s.techName})))].map(s=>JSON.parse(s));
  const eqs=[...new Set(sessions.map(s=>JSON.stringify({id:s.eqId,name:s.eqName})))].map(s=>JSON.parse(s));
  const totalH=Math.round(filtered.reduce((a,s)=>a+s.durationH,0)*10)/10;
  const avgH=filtered.length?Math.round(totalH/filtered.length*10)/10:0;

  return`
    <div class="date-filter">
      <label>Technikas:</label>
      <select class="fi" id="ws-tech" style="width:auto" onchange="renderAll()">
        <option value="all">Visi</option>
        ${techs.map(t=>`<option value="${t.id}"${fTech===t.id?' selected':''}>${esc(t.name)}</option>`).join('')}
      </select>
      <label>Įranga:</label>
      <select class="fi" id="ws-eq" style="width:auto" onchange="renderAll()">
        <option value="all">Visa</option>
        ${eqs.map(e=>`<option value="${e.id}"${fEq===e.id?' selected':''}>${esc(e.name)}</option>`).join('')}
      </select>
    </div>
    ${renderDatePresets('ws-from','ws-to')}
    <div class="date-filter">
      <label>Nuo:</label><input type="date" id="ws-from" value="${fFrom}" onchange="renderAll()">
      <label>Iki:</label><input type="date" id="ws-to" value="${fTo}" onchange="renderAll()">
      <button class="btn btn-sm" onclick="document.getElementById('ws-from').value='';document.getElementById('ws-to').value='';renderAll()">✕</button>
      <button class="btn btn-sm bp" style="margin-left:auto" onclick="exportWorkExcel()">Excel</button>
    </div>
    <div class="stats-g" style="margin-bottom:24px">
      <div class="sc"><div class="sc-n" style="color:var(--ac)">${filtered.length}</div><div class="sc-l">Darbų sesijų</div></div>
      <div class="sc"><div class="sc-n" style="color:var(--green)">${totalH}</div><div class="sc-l">Iš viso valandų</div></div>
      <div class="sc"><div class="sc-n">${avgH}</div><div class="sc-l">Vid. sesija (val.)</div></div>
      <div class="sc"><div class="sc-n">${techList.length}</div><div class="sc-l">Technikų</div></div>
    </div>
    ${techList.length>0?`
    <div class="g2" style="margin-bottom:24px">
      <div class="chart-c">
        <h4>Technikų darbo valandos</h4>
        ${techList.map(t=>`
          <div class="chart-row">
            <div class="chart-label" title="${esc(t.name)}">${esc(t.name)}</div>
            <div class="chart-track"><div class="chart-bar" style="width:${Math.round(t.totalH/maxH*100)}%"></div></div>
            <div class="chart-val">${Math.round(t.totalH*10)/10}h</div>
          </div>`).join('')}
      </div>
      <div class="chart-c">
        <h4>Daugiausiai taisyta įranga</h4>
        ${eqList.map(e=>`
          <div class="chart-row">
            <div class="chart-label" title="${esc(e.name)}">${esc(e.name)}</div>
            <div class="chart-track"><div class="chart-bar" style="width:${Math.round(e.totalH/maxEqH*100)}%;background:var(--amber)"></div></div>
            <div class="chart-val">${Math.round(e.totalH*10)/10}h</div>
          </div>`).join('')}
      </div>
    </div>`:''}
    <div class="sh">Detalus žurnalas (${filtered.length})</div>
    ${filtered.length===0?`<div class="empty" style="padding:20px">Nėra duomenų</div>`:`
    <div style="overflow-x:auto">
    <table class="tx-tbl">
      <tr><th>Data</th><th>Technikas</th><th>Įranga</th><th>Pradėta</th><th>Baigta</th><th>Trukmė</th><th>Aprašymas</th></tr>
      ${filtered.map(s=>`<tr>
        <td style="font-size:12px;color:var(--tx2)">${new Date(s.startTs).toLocaleDateString('lt-LT')}</td>
        <td><strong>${esc(s.techName)}</strong></td>
        <td>${esc(s.eqName)}</td>
        <td style="font-size:12px">${new Date(s.startTs).toLocaleTimeString('lt-LT',{hour:'2-digit',minute:'2-digit'})}</td>
        <td style="font-size:12px">${new Date(s.endTs).toLocaleTimeString('lt-LT',{hour:'2-digit',minute:'2-digit'})}</td>
        <td><strong style="color:var(--ac)">${s.durationH}h</strong> <span style="font-size:11px;color:var(--tx2)">(${Math.round(s.durationMs/60000)}min)</span></td>
        <td style="font-size:12px;color:var(--tx2)">${esc(s.desc||'—')}</td>
      </tr>`).join('')}
    </table></div>`}`;
}

function exportWorkExcel(){
  if(!window.XLSX){toast('XLSX negalimas');return}
  const rows=S.workSessions.map(s=>({
    'Data':new Date(s.startTs).toLocaleDateString('lt-LT'),
    'Technikas':s.techName,'Įranga':s.eqName,
    'Pradėta':new Date(s.startTs).toLocaleTimeString('lt-LT'),
    'Baigta':new Date(s.endTs).toLocaleTimeString('lt-LT'),
    'Valandos':s.durationH,'Minutės':Math.round(s.durationMs/60000),
    'Aprašymas':s.desc||''
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Darbo laikas');
  XLSX.writeFile(wb,'tech-darbo-laikas-'+new Date().toISOString().slice(0,10)+'.xlsx');
  toast('📊 Eksportuota!');
}

function vOpEventDetail(evtId){
  const evt=S.events.find(e=>e.id===evtId);
  if(!evt)return'';
  const plan=evt.plan||[];
  const team=evt.team||[];
  const taken=plan.filter(p=>p.takenTs);
  const sec=S.evtSection||'info';
  const chat=evt.chat||[];
  const dur=calcEvtDuration(evt);
  const timeStr=(evt.startTime||evt.endTime)?(evt.startTime||'?')+(evt.endTime?' → '+evt.endTime:''):'';

  let html='<button class="back" onclick="S.viewEvtId=null;S.evtSection=\'info\';renderAll()">← Atgal į renginius</button>';
  html+=`<div style="margin-bottom:14px">
    <div style="font-size:11px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:0.3px">🎪 Renginys</div>
    <div style="font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-top:2px">${esc(evt.name)}</div>
    ${evt.date?`<div style="font-size:13px;color:var(--tx2);margin-top:4px;display:flex;flex-wrap:wrap;gap:6px 10px">
      <span>📅 ${evt.date}${evt.endDate&&evt.endDate!==evt.date?' → '+evt.endDate:''}</span>
      ${timeStr?`<span>🕐 ${timeStr}</span>`:''}
      ${dur?`<span style="background:var(--ac-dim);color:var(--ac);padding:1px 8px;border-radius:99px;font-weight:600">⏱ ${dur}</span>`:''}
      ${evt.location?`<span>📍 ${esc(evt.location)}</span>`:''}
    </div>`:''}
  </div>`;

  const unreadChat=getUnreadChatCount(evt);
  html+=`<div class="evt-tabs">
    <button class="et-btn${sec==='equipment'?' on':''}" onclick="setEvtSection('equipment')">📦 Įranga ${plan.length>0?`<span class="ec">${taken.length}/${plan.length}</span>`:''}</button>
    <button class="et-btn${sec==='info'?' on':''}" onclick="setEvtSection('info')">🎪 Info</button>
    <button class="et-btn${sec==='tasks'?' on':''}" onclick="setEvtSection('tasks')">✅ Taskai ${(()=>{const tasks=evt.tasks||[];const open=tasks.filter(t=>!t.done).length;return open>0?`<span class="ec">${open}</span>`:tasks.length>0?`<span class="ec" style="background:var(--green);color:#fff">✓</span>`:''})()}</button>
    <button class="et-btn${sec==='contacts'?' on':''}" onclick="setEvtSection('contacts')">👥 Komanda ${team.length>0?`<span class="ec">${team.length}</span>`:''}</button>
    <button class="et-btn${sec==='chat'?' on':''}" onclick="setEvtSection('chat')">💬 Pokalbis ${chat.length>0?`<span class="ec"${unreadChat>0?' style="background:var(--red);color:#fff"':''}>${unreadChat>0?unreadChat:chat.length}</span>`:''}</button>
    <button class="et-btn${sec==='log'?' on':''}" onclick="setEvtSection('log')">📋 Žurnalas</button>
  </div>`;

  if(sec==='info')return html+vEvtSecInfo(evt);
  if(sec==='tasks')return html+vEvtSecTasks(evt);
  if(sec==='contacts')return html+vEvtSecContactsReadOnly(evt);
  if(sec==='chat')return html+vEvtSecChat(evt);
  if(sec==='log')return html+vEvtSecLog(evt);
  return html+vEvtSecEquipmentOp(evt);
}

/* ===== EQUIPMENT SECTION (OPERATOR) ===== */
function vEvtSecEquipmentOp(evt){
  const evtId=evt.id;
  const plan=evt.plan||[];
  const taken=plan.filter(p=>p.takenTs);
  const notTaken=plan.filter(p=>!p.takenTs);
  // Sort: must-have first, then assigned to me, then rest
  const myUid=S.session.userId;
  const myName=S.session.name;
  notTaken.sort((a,b)=>{
    if(a.mustHave!==b.mustHave)return b.mustHave-a.mustHave;
    const aMine=a.assignedUserId===myUid||a.assignedUserName===myName;
    const bMine=b.assignedUserId===myUid||b.assignedUserName===myName;
    if(aMine!==bMine)return bMine-aMine;
    return 0;
  });
  // Find equipment taken for THIS event but NOT in the plan (extras)
  const extras=S.eq.filter(e=>e.s==='o'&&e.evtId===evtId&&!plan.find(p=>p.eqId===e.id));
  const pct=plan.length?Math.round((taken.length)/plan.length*100):0;

  let h='';
  if(plan.length>0){
    h+=`<div class="lcard" style="margin-bottom:18px;flex-direction:column;align-items:stretch;gap:10px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="font-size:14px;font-weight:600">Paėmimo progresas</div>
        <div style="font-size:20px;font-weight:700;color:${taken.length===plan.length?'var(--green)':'var(--ac)'}">${taken.length}/${plan.length}</div>
      </div>
      <div style="height:8px;background:var(--sf2);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${taken.length===plan.length?'var(--green)':'var(--ac)'};border-radius:4px;transition:.5s"></div>
      </div>
    </div>`;
  }

  if(plan.length===0){
    h+=`<div class="lcard" style="background:var(--ac-dim);border-color:rgba(0,113,227,0.25);text-align:center;padding:30px 20px">
      <div style="font-size:2rem;margin-bottom:8px">📷</div>
      <div style="font-weight:700;margin-bottom:4px">Plano dar nėra</div>
      <div style="font-size:13px;color:var(--tx2);margin-bottom:14px">Galite imti įrangą tiesiogiai — skenuokite QR ir pasirinkite šį renginį</div>
      <button class="btn bp" onclick="S.tab='scanner';S.scan='idle';renderAll()">📷 Skenuoti įrangą</button>
    </div>`;
    if(extras.length>0){
      h+=`<div class="sh" style="color:var(--amber);margin-top:14px">📦 Paimta šiam renginiui (${extras.length})</div><div class="list">`;
      extras.forEach(eq=>{
        const ph=eqPhoto(eq.id);
        h+=`<div class="lcard" style="border-left:3px solid var(--amber)">
          <div class="lcard-ico" style="background:var(--amber-bg);width:40px;height:40px;font-size:1.1rem;border-radius:10px">${ph?`<img src="${ph}">`:(eq.ico||'🔧')}</div>
          <div class="lcard-body">
            <div class="lcard-name">${esc(eq.name)}</div>
            <div class="lcard-sub"><span>👤 ${esc(empName(eq.byId)||eq.byName||'?')}</span><span>${ago(eq.at)}</span></div>
          </div>
        </div>`;
      });
      h+='</div>';
    }
    return h;
  }

  if(notTaken.length>0){
    h+=`<div class="sh" style="color:var(--ac)">📤 Reikia pasiimti (${notTaken.length})</div><div class="list" style="margin-bottom:18px">`;
    notTaken.forEach(p=>{
      const eq=S.eq.find(e=>e.id===p.eqId);
      const ph=eq?eqPhoto(eq.id):null;
      const isMine=p.assignedUserId===myUid||p.assignedUserName===myName||
                   (evt.team||[]).some(t=>(t.userId===myUid||t.id===myUid||t.name===myName)&&t.id===p.assignedUserId);
      const assignedToOther=p.assignedUserId&&!isMine;
      const borderColor=p.mustHave?'var(--red)':isMine?'var(--ac)':'var(--bo)';
      h+=`<div class="lcard" style="border-left:3px solid ${borderColor}">
        <div class="lcard-ico lcard-a" style="width:44px;height:44px;font-size:1.2rem">${ph?`<img src="${ph}">`:(eq?eq.ico||'🔧':'📦')}</div>
        <div class="lcard-body">
          <div class="lcard-name">${p.mustHave?'<span style="color:var(--red)">⭐ </span>':''}${esc(eq?eq.name:p.eqName)}</div>
          <div class="lcard-sub">${p.mustHave?`<span style="color:var(--red);font-weight:700">PRIVALOMA</span>`:''}${eq?`<span>${catStr(eq)||'—'}</span>${eq.serialNo?`<span>S/N: ${esc(eq.serialNo)}</span>`:''}`:''}${assignedToOther?`<span style="color:var(--amber)">👤 ${esc(p.assignedUserName||'?')}</span>`:isMine?`<span style="color:var(--ac);font-weight:600">Jums priskirta</span>`:''}</div>
        </div>
        <button class="btn btn-sm bp" onclick="quickMarkFromTask('${evtId}','${p.eqId}')">✅ Paimu</button>
      </div>`;
    });
    h+='</div>';
  }


  if(taken.length>0){
    h+=`<div style="background:var(--ac-dim);border:0.5px solid rgba(0,113,227,0.25);border-radius:var(--rad-sm);padding:10px 14px;margin:14px 0 8px;font-size:12px;color:var(--ac);display:flex;align-items:center;gap:8px">📥 Grąžinimui eikite į <strong>„Mano paimta"</strong> skirtuką viršuje</div><details${notTaken.length>0?'':' open'} style="margin-top:8px">
      <summary style="cursor:pointer;font-size:13px;font-weight:700;color:var(--green);padding:8px 0;display:flex;align-items:center;gap:6px">
        <span>✅ Paimta (${taken.length})</span>
      </summary>
      <div class="list" style="margin-top:8px">`;
    taken.forEach(p=>{
      const eq=S.eq.find(e=>e.id===p.eqId);
      const ph=eq?eqPhoto(eq.id):null;
      h+=`<div class="lcard" style="border-left:3px solid var(--green);opacity:0.92">
        <div class="lcard-ico" style="background:var(--green-bg);width:40px;height:40px;font-size:1.1rem;border-radius:10px">${ph?`<img src="${ph}">`:(eq?eq.ico||'🔧':'📦')}</div>
        <div class="lcard-body">
          <div class="lcard-name">${esc(eq?eq.name:p.eqName)}</div>
          <div class="lcard-sub"><span>👤 ${esc(p.takenBy||'?')}</span><span>${ago(p.takenTs)}</span></div>
        </div>
        <span class="bdg bg-g">✅</span>
      </div>`;
    });
    h+='</div></details>';
  }
  return h;
}

async function quickReturn(eqId){
  console.log('[Oniroco] quickReturn called',eqId);
  try{
    const item=S.eq.find(e=>e.id===eqId);

async function doQuickReturn(eqId){
  try{
    const item=S.eq.find(e=>e.id===eqId);
    if(!item||item.s!=='o'){toast('⚠️ Įranga jau grąžinta');return}
    const txRec={id:uid(),eid:eqId,en:item.name,tp:'i',p:empName(item.byId)||item.byName||'?',pId:item.byId,evtId:item.evtId,evN:evtName(item.evtId)||'',ts:Date.now(),note:'Greitas grąžinimas',by:S.session.name};
    S.tx.unshift(txRec);
    const newUseCount=(item.useCount||0)+1;
    const newTotalMs=(item.totalUsageMs||0)+(item.at?Date.now()-item.at:0);
    S.eq=S.eq.map(e=>e.id===eqId?{...e,s:'a',byId:null,byName:null,at:null,evtId:null,projectId:null,useCount:newUseCount,totalUsageMs:newTotalMs}:e);
    clearPlanTakenForEq(eqId);
    try{await fbSaveOne('eq',S.eq.find(e=>e.id===eqId));await fbSaveOne('tx',txRec);}catch(e){console.warn('FB save:',e)}
    await save('eq');await save('tx');
    logAction('EQ_RETURNED','equipment',{id:eqId,name:item.name,evtId:item.evtId||null,evtName:evtName(item.evtId)||''});
    renderAll();toast('📥 '+item.name+' — grąžinta');
  }catch(e){
    console.error('doQuickReturn error:',e);
    toast('❌ Klaida grąžinant: '+e.message);
  }
}

/* ===== ORG EVENTS LIST ===== */
function vOrgEvents(){
  if(S.viewEvtId)return vOrgEventDetail(S.viewEvtId);
  const today=new Date().toISOString().slice(0,10);
  const evts=[...S.events].sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  const upcoming=evts.filter(e=>!e.archived&&!e.deleted&&(!e.date||(e.endDate||e.date)>=today)).reverse();
  const recentPast=evts.filter(e=>!e.archived&&!e.deleted&&e.date&&(e.endDate||e.date)<today);
  const archived=evts.filter(e=>e.archived&&!e.deleted);
  const deleted=evts.filter(e=>e.deleted).sort((a,b)=>(b.deletedAt||0)-(a.deletedAt||0));

  function evtCard(e){
    const plan=e.plan||[];
    const taken=plan.filter(p=>p.takenTs).length;
    const total=plan.length;
    const pct=total?Math.round(taken/total*100):0;
    const isPast=e.date&&e.date<today;
    const arch=e.archived;
    const dur=calcEvtDuration(e);
    const timeStr=(e.startTime||e.endTime)?(e.startTime||'?')+(e.endTime?'-'+e.endTime:''):'';
    const creator=getEvtCreatorName(e);
    return`<div class="lcard" style="cursor:pointer;flex-direction:column;align-items:stretch;${arch?'opacity:0.75':''}" onclick="S.viewEvtId='${e.id}';renderAll()">
      <div style="display:flex;align-items:center;gap:12px">
        <div class="lcard-ico" style="background:${arch?'rgba(255,255,255,0.04)':isPast?'rgba(255,255,255,0.06)':'var(--ac-dim)'};font-size:1.4rem">${arch?'🏁':'🎪'}</div>
        <div class="lcard-body">
          <div class="lcard-name">${esc(e.name)}</div>
          <div class="lcard-sub">
            ${e.date?`<span>📅 ${e.date}${e.endDate&&e.endDate!==e.date?' → '+e.endDate:''}</span>`:''}
            ${timeStr?`<span>🕐 ${timeStr}${dur?' ('+dur+')':''}</span>`:(dur?`<span>⏱ ${dur}</span>`:'')}
            ${e.location?`<span>📍 ${esc(e.location)}</span>`:''}
            ${creator?`<span style="color:var(--ac);font-weight:500">✨ ${esc(creator)}</span>`:''}
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          ${total>0?`<div><div style="font-size:13px;font-weight:700;color:${taken===total?'var(--green)':'var(--ac)'}">${taken}/${total}</div><div style="font-size:11px;color:var(--tx2);text-align:right">paimta</div></div>`:`<span class="bdg bg-gray">Be įrangos</span>`}
          <button class="ibtn" onclick="event.stopPropagation();duplicateEvent('${e.id}')" title="Dublikuoti renginį" style="padding:4px 8px;font-size:13px;line-height:1">⎘</button>
        </div>
      </div>
      ${total>0?`<div style="margin-top:10px">
        <div style="height:4px;background:var(--sf2);border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${taken===total?'var(--green)':'var(--ac)'};border-radius:2px;transition:.4s"></div>
        </div>
      </div>`:''}
    </div>`;
  }

  // Build creator options: STRICTLY only Renginio organizatoriai (event_org)
  // Admins/koordinatoriai are NEVER in chip list — their events still show when filter is "Visi" (empty)
  // If admin needs to filter to their own events, they can press "Visi" + use search
  const creatorIds=new Set();
  // Add ONLY users with event_org role
  S.users.forEach(u=>{
    if(u.role==='event_org')creatorIds.add(u.id);
  });
  
  const creatorOptions=[...creatorIds].map(uid=>{
    const u=S.users.find(u=>u.id===uid);
    if(!u)return null;
    // Look up linked employee for photo
    const emp=S.employees.find(e=>e.userId===u.id);
    const photo=emp&&emp.photo?emp.photo:null;
    // Count of events this user actually created
    const evtCount=evts.filter(e=>e.createdById===uid&&!e.deleted).length;
    return{id:uid,name:u.name,role:u.role,photo,evtCount};
  }).filter(Boolean).sort((a,b)=>{
    // Current user first
    if(S.session&&a.id===S.session.userId)return -1;
    if(S.session&&b.id===S.session.userId)return 1;
    // Then those with events first
    if((a.evtCount>0)!==(b.evtCount>0))return b.evtCount-a.evtCount;
    return a.name.localeCompare(b.name,'lt');
  });
  
  // Initialize filter state if not set
  // - event_org user: default to filter their own events (they're in chip list)
  // - admin/koordinatorius: default to "all" (empty filter) since they're not in chip list
  if(!S._evtCreatorFilter){
    if(S.session&&S.session.userId&&S.session.role==='event_org'){
      S._evtCreatorFilter=[S.session.userId];
    } else {
      S._evtCreatorFilter=[];
    }
  }
  
  // Apply creator filter — empty filter = show all, non-empty = strictly filter
  const isAllSelected=S._evtCreatorFilter.length===0;
  const filterByCreator=(events)=>{
    if(isAllSelected)return events;
    return events.filter(e=>S._evtCreatorFilter.includes(e.createdById));
  };
  
  // Apply search filter on top of creator filter
  const q=(S._evtSearch||'').toLowerCase().trim();
  const filterBySearch=(events)=>{
    if(!q)return events;
    return events.filter(e=>
      (e.name||'').toLowerCase().includes(q)||
      (e.location||'').toLowerCase().includes(q)||
      (e.responsible||'').toLowerCase().includes(q)||
      (e.desc||'').toLowerCase().includes(q)
    );
  };
  
  const filteredUpcoming=applyEvtQuickFilter(filterBySearch(filterByCreator(upcoming)));
  const filteredRecentPast=applyEvtQuickFilter(filterBySearch(filterByCreator(recentPast)));
  const filteredArchived=applyEvtQuickFilter(filterBySearch(filterByCreator(archived)));
  const filteredDeleted=applyEvtQuickFilter(filterBySearch(filterByCreator(deleted)));
  
  // Build a special card renderer for deleted events with restore + permanent delete buttons
  function deletedCard(e){
    const dur=calcEvtDuration(e);
    const timeStr=(e.startTime||e.endTime)?(e.startTime||'?')+(e.endTime?'-'+e.endTime:''):'';
    return`<div class="lcard" style="flex-direction:column;align-items:stretch;opacity:0.65;border-left:3px solid var(--red)">

          <div class="lcard-sub">
            ${e.date?`<span>📅 ${e.date}${e.endDate&&e.endDate!==e.date?' → '+e.endDate:''}</span>`:''}
            ${timeStr?`<span>🕐 ${timeStr}${dur?' ('+dur+')':''}</span>`:''}
            ${e.location?`<span>📍 ${esc(e.location)}</span>`:''}
            ${e.deletedAt?`<span style="color:var(--red)">🗑️ ${ago(e.deletedAt)}${e.deletedBy?' · '+esc(e.deletedBy):''}</span>`:''}
          </div>
        </div>
        <div class="lcard-acts" onclick="event.stopPropagation()">

          ${isStrictAdmin()?`<button class="ibtn" onclick="permanentlyDeleteEvent('${e.id}')" title="Ištrinti visam laikui (tik administratorius)" style="background:var(--red-bg);color:var(--red);border-color:rgba(255,69,58,0.3)">💥</button>`:''}
        </div>
      </div>
    </div>`;
  }
  
  // Build combined filter function for calendar (creator + category)
  const calFilterFn=(e)=>{
    // Creator filter
    if(!isAllSelected&&!S._evtCreatorFilter.includes(e.createdById))return false;
    // Category filter (empty = all categories)
    if(S._evtCalCatFilter&&S._evtCalCatFilter.length>0){
      if(!S._evtCalCatFilter.includes(e.category||EVT_CAT_DEFAULT))return false;
    }
    return true;

  // Calendar view branches off after filter setup
  if(S.evtView==='calendar'){
    // Apply same quick filter as list (date + category) — but date filter ALSO moves the calendar
    const qfDate=S._evtQuickDateFilter;

    } else if(qfDate==='next_month'){
      // Auto-set view to next month
      const t=new Date();t.setMonth(t.getMonth()+1);
      if(S.calY!==t.getFullYear()||S.calM!==t.getMonth()){
        // Will be applied when user clicks the chip, but we don't auto-jump on every render
      }
    }
    
    // Combine creator + category quick filter for calendar
    const calCombinedFilter=(e)=>{
      // Creator filter
      if(!isAllSelected&&!S._evtCreatorFilter.includes(e.createdById))return false;
      // Quick category filter (single choice)
      if(qfCat&&(e.category||EVT_CAT_DEFAULT)!==qfCat)return false;
      // Quick date filter — note: in calendar view, this is mostly informational
      // (calendar shows time range, but we still highlight matching events)
      return true;
    };
    
    // Counts for chips
    const allActive=evts.filter(e=>!e.deleted);
    const todayStr=new Date().toISOString().slice(0,10);
    const cntToday=allActive.filter(e=>{const s=e.startDate||e.date;const en=e.endDate||e.date||s;return s&&todayStr>=s&&todayStr<=en}).length;
    const wkT=new Date();const wkDow=(wkT.getDay()+6)%7;wkT.setDate(wkT.getDate()-wkDow);const wkStart=wkT.toISOString().slice(0,10);wkT.setDate(wkT.getDate()+6);const wkEnd=wkT.toISOString().slice(0,10);
    const cntWeek=allActive.filter(e=>{const s=e.startDate||e.date;const en=e.endDate||e.date||s;return s&&s<=wkEnd&&en>=wkStart}).length;

      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px;font-size:11px;color:var(--tx2);align-items:center">

        <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:14px;height:14px;border-radius:3px;background:rgba(255,159,10,0.15);border:1px solid rgba(255,159,10,0.3)"></span>Savaitgalis</span>
        <span style="display:inline-flex;align-items:center;gap:5px"><span style="width:14px;height:14px;border-radius:3px;background:rgba(0,113,227,0.1);border:1px solid var(--ac)"></span>Šiandien</span>
      </div>
      ${renderCalendar(calCombinedFilter)}
    `;
  }
  
  return`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px">
      <div>
        <div style="font-size:26px;font-weight:700;letter-spacing:-0.6px">Renginiai</div>
        <div style="font-size:13px;color:var(--tx2);margin-top:2px">Spauskite renginį valdyti įrangą</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <div class="vtoggle"><button class="vt on">📋 Sąrašas</button><button class="vt" onclick="S.evtView='calendar';renderAll()">📅 Kalendorius</button></div>
        <button class="btn bp" onclick="openModal('evt',null)">+ Naujas</button>
      </div>
    </div>
    
    ${creatorOptions.length>=1?`
    <details style="background:var(--sf2);border-radius:14px;padding:0;margin-bottom:14px;border:0.5px solid var(--bo)"${!isAllSelected?' open':''}>
      <summary style="cursor:pointer;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;list-style:none;user-select:none;border-radius:14px">
        <div style="display:inline-flex;align-items:center;gap:8px;flex:1;min-width:0">
          <span style="font-size:11px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;display:inline-flex;align-items:center;gap:6px">${ico('sparkles',12)}<span>Filtras pagal organizatorių</span></span>
          <span style="font-size:11px;color:${isAllSelected?'var(--tx2)':'var(--ac)'};font-weight:600">${isAllSelected?'· Visi':'· '+S._evtCreatorFilter.length+' pasirinkti'}</span>

      </summary>
      <div style="padding:0 14px 14px 14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;padding-top:6px;border-top:0.5px solid var(--bo)">
          <div style="font-size:11px;color:var(--tx2)">${isAllSelected?'Rodomi VISŲ organizatorių renginiai':'Rodomi pasirinktų '+S._evtCreatorFilter.length+' organizatorių renginiai'}</div>
          <button class="btn btn-sm" onclick="toggleAllCreators()" style="font-size:11px;padding:4px 10px">${isAllSelected?(S.session&&S.session.role==='event_org'?'Tik mano':'Filtruoti'):'Visi'}</button>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${creatorOptions.map(c=>renderCreatorChip(c)).join('')}
        </div>
      </div>
    </details>
    `:''}
    
    ${(()=>{
      // Combine recent past + archived into one "Įvykę" section
      const allPast=[...filteredRecentPast,...filteredArchived];
      const totalPastUnfiltered=recentPast.length+archived.length;
      const activeTab=S._evtListTab||'upcoming';
      
      // Build quick filter chips row — TWO INDEPENDENT GROUPS (date + category)
      const qfDate=S._evtQuickDateFilter;
      const qfCat=S._evtQuickCatFilter;
      // Calculate counts (using all events, before tab filtering)
      const allActive=evts.filter(e=>!e.deleted);
      const todayStr=new Date().toISOString().slice(0,10);
      const cntToday=allActive.filter(e=>{const s=e.startDate||e.date;const en=e.endDate||e.date||s;return s&&todayStr>=s&&todayStr<=en}).length;
      const wkT=new Date();const wkDow=(wkT.getDay()+6)%7;wkT.setDate(wkT.getDate()-wkDow);const wkStart=wkT.toISOString().slice(0,10);wkT.setDate(wkT.getDate()+6);const wkEnd=wkT.toISOString().slice(0,10);
      const cntWeek=allActive.filter(e=>{const s=e.startDate||e.date;const en=e.endDate||e.date||s;return s&&s<=wkEnd&&en>=wkStart}).length;
      const ymToday=todayStr.substring(0,7);
      const cntMonth=allActive.filter(e=>(e.startDate||e.date||'').startsWith(ymToday)).length;
      const nmT=new Date();nmT.setMonth(nmT.getMonth()+1);const ymNext=nmT.toISOString().substring(0,7);
      const cntNextMonth=allActive.filter(e=>(e.startDate||e.date||'').startsWith(ymNext)).length;
      const cntTechno=allActive.filter(e=>(e.category||EVT_CAT_DEFAULT)==='techno').length;
      const cntB2B=allActive.filter(e=>(e.category||EVT_CAT_DEFAULT)==='b2b').length;
      const cntRental=allActive.filter(e=>(e.category||EVT_CAT_DEFAULT)==='rental').length;
      
      const dateChip=(key,iconHtml,label,count,color)=>{
        const active=qfDate===key;
        const c=color||'var(--ac)';
        return `<button class="qf-chip${active?' on':''}" onclick="setEvtQuickDateFilter('${key}')" style="${active?`background:${c};color:#fff;border-color:${c}`:''}">
          ${iconHtml}<span>${label}</span>${count>0?`<span class="qf-cnt"${active?` style="background:rgba(255,255,255,0.25);color:#fff"`:''}>${count}</span>`:''}
        </button>`;
      };
      const catChip=(key,iconHtml,label,count,color)=>{
        const active=qfCat===key;
        const c=color||'var(--ac)';
        return `<button class="qf-chip${active?' on':''}" onclick="setEvtQuickCatFilter('${key}')" style="${active?`background:${c};color:#fff;border-color:${c}`:''}">
          ${iconHtml}<span>${label}</span>${count>0?`<span class="qf-cnt"${active?` style="background:rgba(255,255,255,0.25);color:#fff"`:''}>${count}</span>`:''}
        </button>`;
      };
      const technoIco=`<span style="width:13px;height:13px;display:inline-flex">${EVT_CATS.techno.svg}</span>`;
      const b2bIco=`<span style="width:13px;height:13px;display:inline-flex">${EVT_CATS.b2b.svg}</span>`;
      const rentalIco=`<span style="width:13px;height:13px;display:inline-flex">${EVT_CATS.rental.svg}</span>`;
      const hasAnyQF=qfDate||qfCat;
      // "All" chip — active when no specific filter chosen, clicking clears the group
      const allDateChip=`<button class="qf-chip${!qfDate?' on':''}" onclick="setEvtQuickDateFilter(null)" style="${!qfDate?'background:var(--tx);color:var(--bg);border-color:var(--tx)':''}">
        <span>${ico('filter',12)}</span><span>Visi</span>
      </button>`;
      const allCatChip=`<button class="qf-chip${!qfCat?' on':''}" onclick="setEvtQuickCatFilter(null)" style="${!qfCat?'background:var(--tx);color:var(--bg);border-color:var(--tx)':''}">
        <span>${ico('filter',12)}</span><span>Visos</span>
      </button>`;
      const quickFiltersHTML=`<div style="margin-bottom:14px;display:flex;flex-direction:column;gap:8px">
        <div class="qf-row" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <span style="font-size:10px;color:var(--tx2);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-right:2px">Laikas:</span>
          ${allDateChip}
          ${dateChip('today',ico('pin',13),'Šiandien',cntToday,'#FF453A')}
          ${dateChip('week',ico('calendarWeek',13),'Šią savaitę',cntWeek,'#0071E3')}
          ${dateChip('month',ico('calendar',13),'Šį mėnesį',cntMonth,'#5856D6')}
          ${dateChip('next_month',ico('calendarPlus',13),'Kitą mėnesį',cntNextMonth,'#AF52DE')}
        </div>
        <div class="qf-row" style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          <span style="font-size:10px;color:var(--tx2);font-weight:700;text-transform:uppercase;letter-spacing:0.06em;margin-right:2px">Kategorija:</span>
          ${allCatChip}
          ${catChip('techno',technoIco,'Technoklasė',cntTechno,EVT_CATS.techno.color)}
          ${catChip('b2b',b2bIco,'B2B renginiai',cntB2B,EVT_CATS.b2b.color)}
          ${catChip('rental',rentalIco,'Įrangos nuoma',cntRental,EVT_CATS.rental.color)}
          ${hasAnyQF?`<button class="qf-clear" onclick="clearEvtQuickFilters()" title="Išvalyti visus filtrus" style="margin-left:auto">${ico('close',13)}<span style="margin-left:4px;font-size:11px">Išvalyti</span></button>`:''}
        </div>
      </div>`;
      
      // Build tabs row
      const tabsHTML=`<div class="evt-tabs" style="display:flex;gap:6px;margin-bottom:14px;background:var(--sf2);padding:4px;border-radius:12px;overflow-x:auto;scrollbar-width:none">
        <button class="et-btn ${activeTab==='upcoming'?'on':''}" onclick="S._evtListTab='upcoming';renderAll()">${ico('calendarPlus',14)}<span>Artėjantys</span> ${filteredUpcoming.length>0?`<span class="et-cnt">${filteredUpcoming.length}</span>`:''}</button>
        <button class="et-btn ${activeTab==='past'?'on':''}" onclick="S._evtListTab='past';renderAll()">${ico('flag',14)}<span>Įvykę</span> ${allPast.length>0?`<span class="et-cnt">${allPast.length}</span>`:''}</button>
        ${deleted.length>0?`<button class="et-btn ${activeTab==='deleted'?'on':''}" onclick="S._evtListTab='deleted';renderAll()" style="color:var(--red)">${ico('trash',14)}<span>Ištrinti</span> <span class="et-cnt" style="background:rgba(255,69,58,0.2);color:var(--red)">${deleted.length}</span></button>`:''}
      </div>`;
      
      // Group events by month (YYYY-MM)
      function groupByMonth(events,desc){
        const groups={};
        events.forEach(e=>{
          const d=e.startDate||e.date||'';
          if(!d){if(!groups['__no_date__'])groups['__no_date__']=[];groups['__no_date__'].push(e);return}
          const ym=d.substring(0,7); // YYYY-MM
          if(!groups[ym])groups[ym]=[];
          groups[ym].push(e);
        });
        const monthNames=['Sausis','Vasaris','Kovas','Balandis','Gegužė','Birželis','Liepa','Rugpjūtis','Rugsėjis','Spalis','Lapkritis','Gruodis'];
        return Object.keys(groups).sort((a,b)=>desc?b.localeCompare(a):a.localeCompare(b)).map(ym=>{
          if(ym==='__no_date__')return{label:'Be datos',events:groups[ym]};
          const [y,m]=ym.split('-');
          return{label:monthNames[parseInt(m)-1]+' '+y,events:groups[ym]};
        });
      }
      
      // Render content based on active tab
      let content='';
      if(activeTab==='upcoming'){
        if(filteredUpcoming.length===0){
          if(filteredUpcoming.length===0&&!isAllSelected&&evts.filter(e=>!e.deleted).length>0){
            content=`<div class="empty"><div class="empty-i">🔍</div>Pagal pasirinktą filtrą artėjančių renginių nėra<div style="font-size:13px;margin-top:8px;color:var(--tx2)">Pakeiskite filtrą ar sukurkite naują renginį</div><button class="btn btn-sm bp" onclick="toggleAllCreators()" style="margin-top:14px">Rodyti visus</button></div>`;
          } else {
            content=`<div class="empty"><div class="empty-i">📅</div>Nėra artėjančių renginių<div style="font-size:13px;margin-top:8px;color:var(--tx2)">Spauskite „+ Naujas" arba paspaudus „📅 Kalendorius"</div></div>`;
          }
        } else {
          // Group by month, ascending
          const groups=groupByMonth(filteredUpcoming,false);
          content=groups.map(g=>`
            <div style="margin-bottom:22px">
              <div class="sh" style="display:flex;align-items:center;gap:10px;font-size:12px;font-weight:700;color:var(--ac);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bo)">
                <span style="display:inline-flex;align-items:center;gap:6px">${ico('calendarDays',13)}${esc(g.label)}</span>
                <span style="background:var(--ac-dim);color:var(--ac);font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px">${g.events.length}</span>
              </div>
              <div class="list">${g.events.map(evtCard).join('')}</div>
            </div>
          `).join('');
        }
      } else if(activeTab==='past'){
        if(allPast.length===0){
          content=`<div class="empty"><div class="empty-i">🏁</div>Įvykusių renginių nėra${totalPastUnfiltered>0?'<div style="font-size:13px;margin-top:8px;color:var(--tx2)">Pagal pasirinktą filtrą renginių nerasta</div>':''}</div>`;
        } else {
          // Group by month, descending (newest past first)
          const groups=groupByMonth(allPast,true);
          content=groups.map(g=>`
            <div style="margin-bottom:22px">
              <div class="sh" style="display:flex;align-items:center;gap:10px;font-size:12px;font-weight:700;color:var(--tx2);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--bo)">
                <span style="display:inline-flex;align-items:center;gap:6px">${ico('calendarDays',13)}${esc(g.label)}</span>
                <span style="background:var(--sf2);color:var(--tx2);font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px">${g.events.length}</span>
              </div>
              <div class="list" style="opacity:0.85">${g.events.map(evtCard).join('')}</div>
            </div>
          `).join('');
        }
      } else if(activeTab==='deleted'){
        if(filteredDeleted.length===0){
          content=`<div class="empty"><div class="empty-i">🗑️</div>Ištrintų renginių nėra${deleted.length>0?'<div style="font-size:13px;margin-top:8px;color:var(--tx2)">Pagal pasirinktą filtrą nerasta</div>':''}</div>`;
        } else {
          content=`<div style="background:rgba(255,69,58,0.06);border:1px solid rgba(255,69,58,0.15);border-radius:12px;padding:12px;margin-bottom:14px;color:var(--tx2);font-size:12px">
            ⚠️ Šie renginiai ištrinti, bet juos galima <strong style="color:var(--green)">atstatyti</strong>${isStrictAdmin()?' arba <strong style="color:var(--red)">ištrinti visam laikui</strong>':''}
          </div>
          <div class="list">${filteredDeleted.map(deletedCard).join('')}</div>`;
        }
      }
      
      // Search bar — placed right above the list so it's visually adjacent
      const searchHTML=`
        <div class="fg" style="position:relative;margin-bottom:12px">
          <input id="evt-search-input" class="fi fi-search" type="text" placeholder="🔍 Ieškoti pagal pavadinimą, vietą, kontaktą..." value="${esc(S._evtSearch||'')}" oninput="window.__lastFocusedSearchId='evt-search-input';window.__lastFocusedSearchPos=this.selectionStart;S._evtSearch=this.value;renderAll()" onblur="window.__lastFocusedSearchId=null" style="padding-right:${q?'40px':'14px'}">
          ${q?`<button onclick="S._evtSearch='';renderAll()" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:none;color:var(--tx2);cursor:pointer;font-size:18px;padding:4px 8px" title="Išvalyti">✕</button>`:''}
        </div>
        ${q?`<div style="font-size:12px;color:var(--tx2);margin-bottom:10px">🔍 Rasta: ${filteredUpcoming.length+filteredRecentPast.length+filteredArchived.length+filteredDeleted.length} renginių iš ${evts.length}</div>`:''}
      `;
      
      return quickFiltersHTML+tabsHTML+searchHTML+content;
    })()}`;
}

/* ===== ORG EVENT DETAIL (TABBED) ===== */
function vOrgEventDetail(evtId){
  const evt=S.events.find(e=>e.id===evtId);
  if(!evt)return'';
  const plan=evt.plan||[];
  const team=evt.team||[];
  const taken=plan.filter(p=>p.takenTs);
  const sec=S.evtSection||'info';
  const chat=evt.chat||[];

  // Header with action buttons
  const evtArchived=evt.archived;
  const dur=calcEvtDuration(evt);
  const timeStr=(evt.startTime||evt.endTime)?(evt.startTime||'?')+(evt.endTime?' → '+evt.endTime:''):'';
  
  // Build creator info: lookup user → employee for photo, role, phone, email
  let creatorCard='';
  // Try to find creator info: stored on event, or fallback to audit log (EVT_CREATED)
  let creatorId=evt.createdById;
  let creatorName=evt.createdBy;
  if(!creatorId&&!creatorName&&S.audit){
    const auditEntry=S.audit.find(a=>(a.action==='EVT_CREATED'||a.action==='EVT_DUPLICATED')&&a.targetId===evt.id);
    if(auditEntry){
      creatorId=auditEntry.userId;
      creatorName=auditEntry.userName;
    }
  }
  if(creatorId||creatorName){
    const creator=creatorId?S.users.find(u=>u.id===creatorId):null;
    const creatorEmp=creatorId?S.employees.find(e=>e.userId===creatorId):null;
    creatorName=creatorName||(creator?creator.name:'');
    const creatorRole=creator?(ROLES[creator.role]||creator.role):'';
    const creatorPhone=(creatorEmp&&creatorEmp.phone)||(creator&&creator.phone)||'';
    const creatorEmail=(creatorEmp&&creatorEmp.email)||(creator&&creator.email)||'';
    const creatorPhoto=creatorEmp&&creatorEmp.photo?creatorEmp.photo:null;
    if(creatorName){
      const canEditCreator=isAdmin();
      creatorCard=`<div style="background:var(--sf2);border:0.5px solid var(--bo);border-radius:14px;padding:12px;min-width:240px;max-width:340px;position:relative">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;gap:8px">
          <div style="font-size:10px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:0.04em">✨ Sukūrė renginį</div>
          ${canEditCreator?`<button class="creator-edit-btn" onclick="openChangeCreatorModal('${evt.id}')" title="Pakeisti kūrėją">✎</button>`:''}
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:${creatorPhone||creatorEmail?'10px':'0'}">
          <div style="width:44px;height:44px;border-radius:50%;background:${creatorPhoto?'transparent':'var(--ac-dim)'};color:var(--ac);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;overflow:hidden">${creatorPhoto?`<img src="${esc(creatorPhoto)}" style="width:100%;height:100%;object-fit:cover">`:initials(creatorName)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:600;letter-spacing:-0.1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(creatorName)}</div>
            ${creatorRole?`<div style="font-size:11px;color:var(--ac);font-weight:500">${esc(creatorRole)}</div>`:''}
          </div>
        </div>
        ${(creatorPhone||creatorEmail)?`<div style="display:flex;gap:5px;flex-wrap:wrap">
          ${creatorPhone?`<a href="tel:${esc(creatorPhone)}" class="btn btn-xs bg" style="text-decoration:none;font-weight:600;flex:1;justify-content:center;min-width:0" title="Skambinti ${esc(creatorPhone)}">📞 Skambinti</a>`:''}
          ${creatorPhone?`<a href="https://wa.me/${esc(creatorPhone.replace(/[^0-9]/g,''))}" target="_blank" class="btn btn-xs" style="text-decoration:none" title="WhatsApp">💬</a>`:''}
          ${creatorEmail?`<a href="mailto:${esc(creatorEmail)}" class="btn btn-xs" style="text-decoration:none" title="${esc(creatorEmail)}">✉️</a>`:''}
        </div>`:`<div style="font-size:11px;color:var(--tx2);font-style:italic">Kontaktinės info nėra</div>`}
      </div>`;
    }
  }
  
  let html='<button class="back" onclick="goBackToEvents()">← Atgal į renginius</button>';
  html+=`<div style="margin-bottom:14px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap">
    <div style="flex:1;min-width:0">
      <div style="font-size:11px;font-weight:700;color:var(--ac);text-transform:uppercase;letter-spacing:0.3px">🎪 Renginys</div>
      <div style="font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-top:2px">${esc(evt.name)}</div>
      ${evt.date?`<div style="font-size:13px;color:var(--tx2);margin-top:4px;display:flex;flex-wrap:wrap;gap:6px 10px">
        <span>📅 ${evt.date}${evt.endDate&&evt.endDate!==evt.date?' → '+evt.endDate:''}</span>
        ${timeStr?`<span>🕐 ${timeStr}</span>`:''}
        ${dur?`<span style="background:var(--ac-dim);color:var(--ac);padding:1px 8px;border-radius:99px;font-weight:600">⏱ ${dur}</span>`:''}
      </div>`:''}
      <div style="display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0;margin-top:12px">
        <button class="btn btn-sm" onclick="openModal('evt','${evt.id}')">✎ Redaguoti</button>
        <button class="btn btn-sm bp" onclick="exportEventPDF('${evt.id}')" title="Atspausdinti PDF">🖨️ PDF</button>
        <button class="btn btn-sm" onclick="exportEventExcel('${evt.id}')" title="Eksportuoti į Excel">📊 Excel</button>
        <button class="btn btn-sm" onclick="toggleEventArchive('${evt.id}')">${evtArchived?'↩️ Aktyvuoti':'🏁 Žymėti įvykęs'}</button>
        <button class="btn btn-sm br" onclick="deleteEventFromOrg('${evt.id}')">🗑️ Ištrinti</button>
      </div>
    </div>
    ${creatorCard}
  </div>`;

  // Inner tabs
  const unreadChat=getUnreadChatCount(evt);
  // Paslaugos (services) tab — visible only to admin and event_org (has financial data)
  const canSeeServices=isAdmin()||isOrg();
  const services=evt.services||[];
  html+=`<div class="evt-tabs">
    <button class="et-btn${sec==='equipment'?' on':''}" onclick="setEvtSection('equipment')">📦 Įranga ${plan.length>0?`<span class="ec">${taken.length}/${plan.length}</span>`:''}</button>
    <button class="et-btn${sec==='info'?' on':''}" onclick="setEvtSection('info')">🎪 Info</button>
    <button class="et-btn${sec==='tasks'?' on':''}" onclick="setEvtSection('tasks')">✅ Taskai ${(()=>{const tasks=evt.tasks||[];const open=tasks.filter(t=>!t.done).length;return open>0?`<span class="ec">${open}</span>`:tasks.length>0?`<span class="ec" style="background:var(--green);color:#fff">✓</span>`:''})()}</button>
    ${canSeeServices?`<button class="et-btn${sec==='services'?' on':''}" onclick="setEvtSection('services')">💰 Paslaugos ${services.length>0?`<span class="ec">${services.length}</span>`:''}</button>`:''}
    <button class="et-btn${sec==='contacts'?' on':''}" onclick="setEvtSection('contacts')">👥 Komanda ${team.length>0?`<span class="ec">${team.length}</span>`:''}</button>
    <button class="et-btn${sec==='chat'?' on':''}" onclick="setEvtSection('chat')">💬 Pokalbis ${chat.length>0?`<span class="ec"${unreadChat>0?' style="background:var(--red);color:#fff"':''}>${unreadChat>0?unreadChat:chat.length}</span>`:''}</button>
    <button class="et-btn${sec==='log'?' on':''}" onclick="setEvtSection('log')">📋 Žurnalas</button>
  </div>`;

  if(sec==='equipment')return html+vEvtSecEquipment(evt);
  if(sec==='tasks')return html+vEvtSecTasks(evt);
  if(sec==='info')return html+vEvtSecInfo(evt);
  if(sec==='services'&&canSeeServices)return html+vEvtSecServices(evt);
  if(sec==='contacts')return html+vEvtSecContacts(evt);
  if(sec==='chat')return html+vEvtSecChat(evt);
  if(sec==='log')return html+vEvtSecLog(evt);
  return html;
}

/* ===== CONTACTS SECTION ===== */


function clearPlanTakenForEq(eqId){
  let changed = false;
  S.events.forEach(evt=>{
    if(!evt.plan||evt.archived)return;
    evt.plan.forEach(p=>{
      if(p.eqId===eqId&&p.takenTs){
        p.takenTs = null;
        p.takenBy = null;
        changed = true;
      }
    });
  });
  if(changed){
    // Single save call — dirty tracking ensures only changed events get written
    save('events').catch(e=>console.warn(e));
  }
}

function canCheckEventTasks(){

}

    h+='<div style="background:var(--sf2);border-radius:14px;padding:14px;margin-bottom:14px">'+

  // Add task input (only event_org and admin)
  if(canManage){
    h+='<div style="background:var(--sf2);border-radius:14px;padding:12px;margin-bottom:14px">'+
      '<div style="font-size:11px;color:var(--tx2);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px">➕ Pridėti užduotį</div>'+

  // Task list
  if(tasks.length === 0){
    h+='<div class="empty"><div class="empty-i">✅</div>'+(canManage?'Nėra užduočių. Pridėkite virš.':'Užduočių dar nėra')+'</div>';
    return h;
  }
  
  h+='<div style="display:flex;flex-direction:column;gap:6px">';
  sortedTasks.forEach(task=>{
    const doneStyle = task.done ? 'opacity:0.55;' : '';
    const lineStyle = task.done ? 'text-decoration:line-through;color:var(--tx2)' : '';
    h+='<div style="display:flex;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--sf);border:0.5px solid var(--bo);border-radius:12px;'+doneStyle+'">'+
      // Checkbox
      (canCheck?
        '<button onclick="toggleEventTask(\''+evt.id+'\',\''+task.id+'\')" style="width:22px;height:22px;border-radius:6px;border:1.5px solid '+(task.done?'var(--green)':'var(--bo)')+';background:'+(task.done?'var(--green)':'transparent')+';cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;padding:0;margin-top:1px">'+(task.done?'✓':'')+'</button>'
        :'<div style="width:22px;height:22px;border-radius:6px;border:1.5px solid '+(task.done?'var(--green)':'var(--bo)')+';background:'+(task.done?'var(--green)':'transparent')+';flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;margin-top:1px">'+(task.done?'✓':'')+'</div>'
      )+
      // Text
      '<div style="flex:1;min-width:0">'+
        '<div style="font-size:14px;line-height:1.4;'+lineStyle+'">'+esc(task.text)+'</div>'+
        '<div style="font-size:11px;color:var(--tx2);margin-top:3px">'+
          '<span>👤 '+esc(task.addedBy||'?')+'</span>'+
          (task.addedTs?' <span>· '+ago(task.addedTs)+'</span>':'')+
          (task.deadline?' <span style="color:var(--ac);font-weight:600">· ⏰ '+esc(task.deadline)+'</span>':'')+
          (task.done&&task.doneBy?' <span style="color:var(--green)">· ✓ atliko '+esc(task.doneBy)+(task.doneTs?' '+ago(task.doneTs):'')+'</span>':'')+
        '</div>'+
      '</div>'+
      // Delete button (only manager)
      (canManage?'<button onclick="removeEventTask(\''+evt.id+'\',\''+task.id+'\')" style="background:transparent;border:none;color:var(--tx2);cursor:pointer;padding:4px;font-size:14px;flex-shrink:0" title="Pašalinti">✕</button>':'')+
    '</div>';
  });
  h+='</div>';
  
  return h;
}

async function applyTaskTemplate(evtId, tplId){
  const tpl = (S.taskTemplates||[]).find(t=>t.id===tplId);
  if(!tpl){toast('Šablonas nerastas');return}
  const evt = S.events.find(e=>e.id===evtId);
  if(!evt){toast('Renginys nerastas');return}
  if(!evt.tasks)evt.tasks=[];
  const existing=evt.tasks.map(t=>t.text.toLowerCase().trim());
  let added=0,skipped=0;
  (tpl.tasks||[]).forEach(taskItem=>{
    // Support both string and object format
    const taskText = typeof taskItem==='string' ? taskItem : (taskItem.text||'');
    const deadline = typeof taskItem==='object' ? (taskItem.deadline||'') : '';
    if(!taskText||!taskText.trim())return;
    if(existing.includes(taskText.toLowerCase().trim())){skipped++;return}
    
    // Calculate deadline date based on event start date
    let deadlineDate=null;
    if(deadline && evt.date){
      const eventDate=new Date(evt.date+'T12:00:00');
      switch(deadline){
        case 'before_3d': eventDate.setDate(eventDate.getDate()-3); deadlineDate=eventDate.toISOString().slice(0,10); break;
        case 'before_2d': eventDate.setDate(eventDate.getDate()-2); deadlineDate=eventDate.toISOString().slice(0,10); break;
        case 'before_1d': eventDate.setDate(eventDate.getDate()-1); deadlineDate=eventDate.toISOString().slice(0,10); break;
        case 'morning_of': deadlineDate=evt.date; break;
        case 'on_event': deadlineDate=evt.date; break;
        case 'after_event': eventDate.setDate(eventDate.getDate()+1); deadlineDate=eventDate.toISOString().slice(0,10); break;
      }
    }
    
    evt.tasks.push({
      id:uid(),
      text:taskText,
      done:false,
      addedBy:S.session.name,
      addedByRole:S.session.role,
      addedTs:Date.now(),
      fromTemplate:tpl.name,
      deadline:deadlineDate,
      deadlineLabel:deadline
    });
    added++;
  });
  S.events=S.events.map(e=>e.id===evtId?evt:e);
  await save('events',evtId)
  logAction('EVT_TASK_TEMPLATE_APPLIED','event',{id:evtId,name:evt.name,note:tpl.name+' ('+added+' new)'});
  renderAll();
  if(skipped>0){
    toast('✅ Pridėta '+added+' užduotys ('+skipped+' jau buvo)');
  } else {
    toast('✅ Pridėta '+added+' užduotys iš šablono „'+tpl.name+'"');
  }
}

function updateTplTask(idx, field, value){
  if(!window._editingTplTasks)return;
  let task=window._editingTplTasks[idx];
  if(typeof task==='string'){
    task={text:task,deadline:''};
    window._editingTplTasks[idx]=task;
  }
  if(!task)return;
  task[field]=value;
}

function addTplTaskField(){
  if(!window._editingTplTasks)window._editingTplTasks=[];
  window._editingTplTasks.push({text:'',deadline:''});
  renderTplTaskFields();
}

function removeTplTaskField(idx){
  if(!window._editingTplTasks)return;
  window._editingTplTasks.splice(idx,1);
  if(window._editingTplTasks.length===0)window._editingTplTasks.push('');
  renderTplTaskFields();
}

async function saveTaskTemplate(tplId){
  const name=document.getElementById('tpl-name').value.trim();
  const icon=document.getElementById('tpl-icon').value.trim()||'📋';
  if(!name){toast('⚠️ Įveskite pavadinimą');return}
  // Convert mixed string/object array to consistent object format
  const tasks=(window._editingTplTasks||[]).map(t=>{
    if(typeof t==='string')return{text:t.trim(),deadline:''};
    return{text:(t.text||'').trim(),deadline:t.deadline||''};
  }).filter(t=>t.text);
  if(tasks.length===0){toast('⚠️ Pridėkite bent vieną užduotį');return}
  
  if(!S.taskTemplates)S.taskTemplates=[];
  
  if(tplId){
    // Edit existing
    const tpl=S.taskTemplates.find(t=>t.id===tplId);
    if(tpl){
      tpl.name=name;
      tpl.icon=icon;
      tpl.tasks=tasks;
      tpl.updated=Date.now();
    }
  } else {
    // New
    S.taskTemplates.push({
      id:uid(),
      name,icon,tasks,
      created:Date.now(),
      createdBy:S.session.name
    });
  }
  
  await save('taskTemplates');
  if(typeof FB!=='undefined'&&FB){
    const tpl=tplId?S.taskTemplates.find(t=>t.id===tplId):S.taskTemplates[S.taskTemplates.length-1];
    if(tpl){try{await FB.collection('taskTemplates').doc(tpl.id).set(tpl)}catch(e){}}
  }
  logAction(tplId?'TASK_TEMPLATE_UPDATED':'TASK_TEMPLATE_CREATED','template',{id:tplId||'new',name});
  
  document.getElementById('tpl-editor').remove();
  
  // Re-render manager
  const mgr=document.getElementById('tpl-mgr');
  if(mgr){
    const card=mgr.firstElementChild;
    if(card)card.innerHTML=renderTaskTemplatesContent();
  }
  
  renderAll();
  toast('✅ Šablonas '+(tplId?'atnaujintas':'sukurtas'));
}

async function deleteTaskTemplate(tplId){
  if(!confirm('Ištrinti šabloną?'))return;
  S.taskTemplates=(S.taskTemplates||[]).filter(t=>t.id!==tplId);
  await save('taskTemplates');
  await fbDelOne('taskTemplates',tplId)
  logAction('TASK_TEMPLATE_DELETED','template',{id:tplId});
  
  // Re-render manager
  const mgr=document.getElementById('tpl-mgr');
  if(mgr){
    const card=mgr.firstElementChild;
    if(card)card.innerHTML=renderTaskTemplatesContent();
  }
  renderAll();
  toast('Šablonas ištrintas');
}


async function addEventTask(evtId){
  const inp = document.getElementById('evt-task-input-'+evtId);
  if(!inp) return;
  const text = inp.value.trim();
  if(!text){toast('⚠️ Įveskite užduoties tekstą');return}
  const evt = S.events.find(e=>e.id===evtId);
  if(!evt){toast('Renginys nerastas');return}
  if(!evt.tasks) evt.tasks = [];
  evt.tasks.push({
    id: uid(),
    text,
    done: false,
    addedBy: S.session.name,
    addedByRole: S.session.role,
    addedTs: Date.now()
  });
  S.events = S.events.map(e=>e.id===evtId?evt:e);
  await save('events',evtId)
  logAction('EVT_TASK_ADDED','event',{id:evtId,name:evt.name,note:text.substring(0,60)});
  inp.value = '';
  renderAll();
  setTimeout(()=>{const ni=document.getElementById('evt-task-input-'+evtId);if(ni)ni.focus()},50);
}

async function toggleEventTask(evtId, taskId){
  const evt = S.events.find(e=>e.id===evtId);
  if(!evt||!evt.tasks) return;
  const task = evt.tasks.find(t=>t.id===taskId);
  if(!task) return;
  task.done = !task.done;
  if(task.done){
    task.doneBy = S.session.name;
    task.doneByRole = S.session.role;
    task.doneTs = Date.now();
  } else {
    task.doneBy = null;
    task.doneTs = null;
  }
  S.events = S.events.map(e=>e.id===evtId?evt:e);
  await save('events',evtId)
  logAction(task.done?'EVT_TASK_DONE':'EVT_TASK_UNDONE','event',{id:evtId,name:evt.name,note:task.text.substring(0,60)});
  renderAll();
}

async function removeEventTask(evtId, taskId){
  const evt = S.events.find(e=>e.id===evtId);
  if(!evt||!evt.tasks) return;
  if(!confirm('Pašalinti šitą užduotį?')) return;
  evt.tasks = evt.tasks.filter(t=>t.id!==taskId);
  S.events = S.events.map(e=>e.id===evtId?evt:e);
  await save('events',evtId)
  logAction('EVT_TASK_REMOVED','event',{id:evtId,name:evt.name});
  renderAll();
}

async function addEvtPhotos(evtId,inp){
  if(!inp.files||inp.files.length===0)return;
  const evt=S.events.find(e=>e.id===evtId);if(!evt)return;
  if(!evt.photos)evt.photos=[];
  const remaining=EVT_GALLERY_MAX-evt.photos.length;
  if(remaining<=0){toast('⚠️ Pasiektas limitas: '+EVT_GALLERY_MAX+' nuotraukos');return}
  const files=Array.from(inp.files).slice(0,remaining);
  if(inp.files.length>remaining){
    toast('⚠️ Pridėta tik '+remaining+' iš '+inp.files.length+' nuotraukų (limitas '+EVT_GALLERY_MAX+')');
  }
  toast('📷 Apdorojama '+files.length+' nuotraukų...');
  let added=0;
  for(const f of files){
    if(!f.type.startsWith('image/'))continue;
    try{
      const compressed=await compressImg(f);
      evt.photos.push(compressed);
      added++;
    }catch(e){console.warn('Photo compression failed:',e)}
  }
  if(added>0){
    S.events=S.events.map(e=>e.id===evtId?evt:e);
    await save('events',evtId)
    logAction('EVT_PHOTO_ADDED','event',{id:evtId,name:evt.name,note:added+' nuotraukos'});
    renderAll();
    toast('✅ Pridėta: '+added+' nuotr.');
  }
  inp.value='';
}

async function removeEvtPhoto(evtId,idx){
  const evt=S.events.find(e=>e.id===evtId);if(!evt||!evt.photos)return;
  if(!confirm('Ištrinti šią nuotrauką?'))return;
  evt.photos.splice(idx,1);
  S.events=S.events.map(e=>e.id===evtId?evt:e);
  await save('events',evtId)
  logAction('EVT_PHOTO_REMOVED','event',{id:evtId,name:evt.name});
  renderAll();
  toast('🗑️ Nuotrauka ištrinta');
}

function openEvtLightbox(evtId,startIdx){
  const evt=S.events.find(e=>e.id===evtId);if(!evt||!evt.photos||evt.photos.length===0)return;
  const photos=evt.photos;
  let curIdx=startIdx||0;
  
  const existing=document.getElementById('evt-lightbox');if(existing)existing.remove();
  const ov=document.createElement('div');
  ov.id='evt-lightbox';
  ov.className='evt-gph-lightbox';
  
  function render(){
    ov.innerHTML='<button class="evt-gph-lightbox-close" onclick="document.getElementById(\'evt-lightbox\').remove()" aria-label="Uždaryti">✕</button>'+
      (photos.length>1?'<button class="evt-gph-lightbox-nav evt-gph-lightbox-prev" data-nav="prev">‹</button>':'')+
      '<img src="'+esc(photos[curIdx])+'" alt="">'+
      (photos.length>1?'<button class="evt-gph-lightbox-nav evt-gph-lightbox-next" data-nav="next">›</button>':'')+
      (photos.length>1?'<div class="evt-gph-counter">'+(curIdx+1)+' / '+photos.length+'</div>':'');
    const prev=ov.querySelector('[data-nav="prev"]');
    const next=ov.querySelector('[data-nav="next"]');
    if(prev)prev.addEventListener('click',e=>{e.stopPropagation();curIdx=(curIdx-1+photos.length)%photos.length;render()});
    if(next)next.addEventListener('click',e=>{e.stopPropagation();curIdx=(curIdx+1)%photos.length;render()});
  }
  render();
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove()});
  // Keyboard navigation
  const onKey=e=>{
    if(e.key==='Escape'){ov.remove();document.removeEventListener('keydown',onKey)}
    else if(e.key==='ArrowLeft'&&photos.length>1){curIdx=(curIdx-1+photos.length)%photos.length;render()}
    else if(e.key==='ArrowRight'&&photos.length>1){curIdx=(curIdx+1)%photos.length;render()}
  };
  document.addEventListener('keydown',onKey);
  document.body.appendChild(ov);
}

// Track read state per user (in localStorage). Key: oni_chatRead_{userId}
function getChatReadMap(){
  try{const v=localStorage.getItem('oni_chatRead_'+(S.session?S.session.userId:'_'));return v?JSON.parse(v):{}}catch(e){return{}}
}
function setChatReadMap(map){
  try{localStorage.setItem('oni_chatRead_'+(S.session?S.session.userId:'_'),JSON.stringify(map))}catch(e){}
}
function getUnreadChatCount(evt){
  if(!evt||!S.session)return 0;
  const chat=evt.chat||[];
  if(chat.length===0)return 0;
  const map=getChatReadMap();
  const lastReadTs=map[evt.id]||0;
  // Count messages newer than lastRead AND not from me
  return chat.filter(m=>m.ts>lastReadTs&&m.byId!==S.session.userId).length;
}
function markChatAsRead(evtId){
  if(!S.session)return;
  const map=getChatReadMap();
  map[evtId]=Date.now();
  setChatReadMap(map);
}

function canChatInEvent(evt){
  if(!S.session||!evt)return false;
  // Admin / org / tech_lead can always chat
  if(['admin','event_org','tech_lead'].includes(S.session.role))return true;
  // Members of the team can chat
  const team=evt.team||[];
  return team.some(t=>t.userId===S.session.userId||t.id===S.session.userId||t.name===S.session.name);
}

// Calculate totals for an event's services
function calcServicesTotal(services) {
  if (!services || services.length === 0) {
    return { net: 0, vat: 0, total: 0, breakdown: { 0: 0, 12: 0, 21: 0 } };
  }
  let net = 0, vat = 0;
  const breakdown = { 0: 0, 12: 0, 21: 0 };
  services.forEach(s => {
    const qty = parseFloat(s.qty) || 1;
    const price = parseFloat(s.priceNet) || 0;
    const rate = parseFloat(s.vatRate) || 0;
    const lineNet = qty * price;
    const lineVat = lineNet * (rate / 100);
    net += lineNet;
    vat += lineVat;
    if (breakdown[rate] !== undefined) breakdown[rate] += lineVat;
  });
  return { net, vat, total: net + vat, breakdown };
}

// Format money in EUR (Lithuanian locale)
function fmtMoney(amount) {
  return (amount || 0).toLocaleString('lt-LT', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' €';
}

async function saveServiceItem() {
  const { evtId, serviceId } = S._svcModal;
  const evt = S.events.find(e => e.id === evtId);
  if (!evt) { toast('⚠️ Renginys nerastas'); return; }
  
  const name = gv('svc-name').trim();
  if (!name) { toast('⚠️ Įveskite pavadinimą'); return; }
  
  const qty = parseFloat(gv('svc-qty')) || 1;
  const priceNet = parseFloat(gv('svc-price')) || 0;
  const vatRate = parseFloat(gv('svc-vat')) || 0;
  
  if (qty <= 0) { toast('⚠️ Kiekis turi būti didesnis už 0'); return; }
  if (priceNet < 0) { toast('⚠️ Kaina negali būti neigiama'); return; }
  if (![0, 12, 21].includes(vatRate)) { toast('⚠️ Netinkamas PVM tarifas'); return; }
  
  const item = {
    id: serviceId || uid(),
    name,
    desc: gv('svc-desc').trim(),
    qty: qty,
    unit: gv('svc-unit') || 'vnt.',
    priceNet: priceNet,
    vatRate: vatRate,
    addedTs: serviceId ? undefined : Date.now(),
    addedBy: serviceId ? undefined : (S.session ? S.session.name : ''),
  };
  
  if (!evt.services) evt.services = [];
  if (serviceId) {
    evt.services = evt.services.map(s => s.id === serviceId ? { ...s, ...item } : s);
  } else {
    evt.services.push(item);
  }
  
  // Add to global catalog if requested
  const addToCatalog = document.getElementById('svc-tocatalog');
  if (addToCatalog && addToCatalog.checked && !addToCatalog.disabled) {
    if (!S.serviceCatalog) S.serviceCatalog = [];
    S.serviceCatalog.push({
      id: uid(),
      name: item.name,
      desc: item.desc,
      qty: item.qty,
      unit: item.unit,
      priceNet: item.priceNet,
      vatRate: item.vatRate,
      created: Date.now(),
    });
    try { await save('serviceCatalog'); } catch(e) { console.warn(e); }
  }
  
  await save('events', evtId);
  logAction(serviceId ? 'EVT_SERVICE_EDITED' : 'EVT_SERVICE_ADDED', 'event', { id: evtId, name: evt.name, serviceName: item.name });
  closeModal();
  renderAll();
  toast('✅ Išsaugota');
}

async function removeService(evtId, serviceId) {
  if (!confirm('Ar tikrai pašalinti šią paslaugą?')) return;
  const evt = S.events.find(e => e.id === evtId);
  if (!evt || !evt.services) return;
  const service = evt.services.find(s => s.id === serviceId);
  evt.services = evt.services.filter(s => s.id !== serviceId);
  await save('events', evtId);
  logAction('EVT_SERVICE_REMOVED', 'event', { id: evtId, name: evt.name, serviceName: service?.name });
  renderAll();
  toast('✅ Pašalinta');
}

async function addServiceFromCatalog(evtId, catalogId) {

  const evt = S.events.find(e => e.id === evtId);

    addedTs: Date.now(),

  toast('✅ Pašalinta');
}

function evtChatAutoResize(ta){
  ta.style.height='auto';
  ta.style.height=Math.min(ta.scrollHeight,120)+'px';
}

function evtChatKeydown(ev,evtId){
  if(ev.key==='Enter'&&!ev.shiftKey){
    ev.preventDefault();
    sendEvtMessage(evtId);
  }
}

async function sendEvtMessage(evtId){
  if(!S.session){toast('⚠️ Prisijunkite');return}
  const evt=S.events.find(e=>e.id===evtId);
  if(!evt){toast('⚠️ Renginys nerastas');return}
  if(!canChatInEvent(evt)){toast('🔒 Negalite rašyti šiame pokalbyje');return}
  const inp=document.getElementById('chat-input');
  if(!inp)return;
  const text=inp.value.trim();
  if(!text){inp.focus();return}
  if(text.length>2000){toast('⚠️ Žinutė per ilga (max 2000 simb.)');return}
  
  if(!evt.chat)evt.chat=[];
  const msg={
    id:uid(),
    text,
    by:S.session.name,
    byId:S.session.userId,
    role:ROLES[S.session.role]||S.session.role,
    ts:Date.now()
  };
  evt.chat.push(msg);
  S.events=S.events.map(e=>e.id===evtId?evt:e);
  
  inp.value='';
  evtChatAutoResize(inp);
  
  // Mark as read for self immediately
  markChatAsRead(evtId);
  
  // Save to localStorage and Firebase
  await save('events',evtId)
  
  renderAll();
  // Re-focus input after re-render
  setTimeout(()=>{const i=document.getElementById('chat-input');if(i)i.focus()},50);
}

async function deleteEvtMessage(evtId,msgId){
  const evt=S.events.find(e=>e.id===evtId);
  if(!evt)return;
  const msg=(evt.chat||[]).find(m=>m.id===msgId);
  if(!msg)return;
  // Only message author or admin can delete
  if(msg.byId!==S.session.userId&&!isAdmin()){toast('🔒 Galite ištrinti tik savo žinutes');return}
  if(!confirm('Ištrinti šią žinutę?'))return;
  evt.chat=(evt.chat||[]).filter(m=>m.id!==msgId);
  S.events=S.events.map(e=>e.id===evtId?evt:e);
  await save('events',evtId)
  renderAll();toast('🗑️ Žinutė ištrinta');
}

function getEventLog(evt){
  // Combine audit entries that relate to this event:
  // 1. target='event' AND targetId=evt.id (create/edit/delete/archive/tasks/team)
  // 2. target='equipment' AND details.evtId=evt.id (EQ_TAKEN/EQ_RETURNED for this event)
  const audit=S.audit||[];
  const filtered=audit.filter(a=>{
    if(a.target==='event'&&a.targetId===evt.id)return true;
    if(a.target==='equipment'&&a.details&&a.details.evtId===evt.id)return true;
    return false;
  });
  // Sort newest first (audit is already in that order, but be safe)
  return filtered.slice().sort((a,b)=>b.ts-a.ts);
}

function vEvtSecLog(evt){
  const entries=getEventLog(evt);
  let h='';
  
  // Stats summary at top
  const stats={created:0,edited:0,planActions:0,equipActions:0,taskActions:0,teamActions:0};
  entries.forEach(e=>{
    if(e.action==='EVT_CREATED'||e.action==='EVT_DUPLICATED')stats.created++;
    else if(e.action==='EVT_EDITED'||e.action==='EVT_ARCHIVED'||e.action==='EVT_UNARCHIVED')stats.edited++;
    else if(e.action==='PLAN_ADDED'||e.action==='PLAN_REMOVED'||e.action==='PLAN_ASSIGNED'||e.action==='PLAN_TAKEN')stats.planActions++;
    else if(e.action==='EQ_TAKEN'||e.action==='EQ_RETURNED')stats.equipActions++;
    else if(e.action&&e.action.startsWith('EVT_TASK_'))stats.taskActions++;
    else if(e.action==='TEAM_ADDED'||e.action==='TEAM_REMOVED')stats.teamActions++;
  });
  
  if(entries.length===0){
    h+=`<div class="empty" style="padding:40px"><div class="empty-i">📋</div>Veiklų kol kas nėra<div style="font-size:12px;margin-top:8px;color:var(--tx2)">Žurnalas pildomas automatiškai kai kas nors atlieka veiksmus su renginiu</div></div>`;
    return h;
  }
  
  // Summary stats
  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin-bottom:16px">`;
  h+=`<div class="sc" style="padding:14px"><div class="sc-n" style="font-size:24px">${entries.length}</div><div class="sc-l">Iš viso veiksmų</div></div>`;
  if(stats.planActions>0)h+=`<div class="sc" style="padding:14px"><div class="sc-n" style="font-size:24px;color:var(--ac)">${stats.planActions}</div><div class="sc-l">Plano veiksmai</div></div>`;
  if(stats.equipActions>0)h+=`<div class="sc" style="padding:14px"><div class="sc-n" style="font-size:24px;color:var(--green)">${stats.equipActions}</div><div class="sc-l">Įrangos srautas</div></div>`;
  if(stats.taskActions>0)h+=`<div class="sc" style="padding:14px"><div class="sc-n" style="font-size:24px;color:var(--amber)">${stats.taskActions}</div><div class="sc-l">Taskų pakeitimai</div></div>`;
  if(stats.teamActions>0)h+=`<div class="sc" style="padding:14px"><div class="sc-n" style="font-size:24px">${stats.teamActions}</div><div class="sc-l">Komandos pokyčiai</div></div>`;
  h+=`</div>`;
  
  // Group entries by date for nicer reading
  const byDate={};
  entries.forEach(e=>{

  h+=`<div style="display:flex;flex-direction:column;gap:18px">`;
  Object.entries(byDate).forEach(([date,items])=>{
    h+=`<div>

      const time=new Date(e.ts).toLocaleTimeString('lt-LT',{hour:'2-digit',minute:'2-digit'});
      let extra='';
      if(e.details){
        if(e.details.eqName)extra=` · 📦 ${esc(e.details.eqName)}`;
        else if(e.details.memberName)extra=` · 👤 ${esc(e.details.memberName)}`;
